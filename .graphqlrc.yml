schema:
  - src/background-jobs/**/*.graphql
  - src/features/**/*.graphql
  - src/schema/**/*.graphql
documents:
  - 'src/features/**/*.{ts,tsx}'
  - 'src/shield-rbac.test.ts'
extensions:
  codegen:
    generates:
      ./src/generated/:
        preset: 'client-preset'
        presetConfig:
          fragmentMasking: false
        plugins:
          - typescript-resolvers:
              contextType: ../context#GraphQLContext
              mappers:
                Template: ../features/templates/entities/template-entity#TemplateEntity
                Contract: ../features/contracts/entities/contract-entity#ContractEntity
                User: ../features/users/entities/user-entity#UserEntity
                Issuance: ../features/issuance/entities/issuance-entity#IssuanceEntity
                Presentation: ../features/presentation/entities/presentation-entity#PresentationEntity
                Identity: ../features/identity/entities/identity-entity#IdentityEntity
                Partner: ../features/network/entities/partner-entity#PartnerEntity
                ApprovalRequest: ../features/approval-request/entities/approval-request-entity#ApprovalRequestEntity
        config:
          strictScalars: true
          scalars:
            # add types for any used scalars here and in schema.ts
            PositiveInt: number
            NonNegativeInt: number
            URL: string
            DateTime: Date
            Locale: string
            HexColorCode: string
            Void: null | undefined | void
            JSONObject: Record<string, unknown>
            EmailAddress: string
