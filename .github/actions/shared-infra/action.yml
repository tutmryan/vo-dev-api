name: Shared infrastructure
description: Deploys shared infrastructure

inputs:
  azure-client-id:
    description: App ID of the deployment app registration
    required: true
  infra-environment:
    description: The hosting environment, either 'nonprd' or 'prd'
    required: true
  resource-group-name:
    description: Name of the resource group to deploy resources to
    required: true
  partner-id:
    description: Microsoft partner network ID to be set as Azure partner admin link
    required: true
  alerts-email:
    description: The email alerts will be sent to
    required: true

outputs:
  sql-server-1-name:
    description: Name of the deployed SQL Server
    value: ${{ steps.deploy-shared-infrastructure.outputs.sqlServer1Name }}
  app-service-plan-1-id:
    description: ID of the deployed App Service Plan
    value: ${{ steps.deploy-shared-infrastructure.outputs.appServicePlan1Id }}

runs:
  using: composite
  steps:
    - name: Set current date as environment variable
      run: echo "NOW=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV
      shell: bash

    - name: Set Azure partner admin link
      shell: pwsh
      run: >-
        ./infrastructure/scripts/create-partner-admin-link.ps1
        -PartnerId ${{ inputs.partner-id }}

    - name: Shared infrastructure
      id: deploy-shared-infrastructure
      uses: azure/arm-deploy@v1
      with:
        deploymentName: ${{env.NOW}}-shared-infra-github-actions
        resourceGroupName: ${{ inputs.resource-group-name }}
        template: ./infrastructure/shared.bicep
        parameters: ./infrastructure/parameters/shared.${{ inputs.infra-environment }}.bicepparam actionGroupAlertEmail=${{ inputs.alerts-email }}

    - name: 'Create database service principal setup scripts'
      shell: bash
      run: |
        appName=`az ad app list --app-id ${{ inputs.azure-client-id }} --query [].displayName --output tsv`
        newPwd=`uuidgen`
        echo "IF NOT EXISTS (SELECT * FROM sys.database_principals WHERE [name] = '${appName}')" >> user-setup.sql
        echo "BEGIN" >> user-setup.sql
        echo "  CREATE LOGIN [${appName}] FROM EXTERNAL PROVIDER;" >> user-setup.sql
        echo "  CREATE USER [${appName}] FOR LOGIN [${appName}];" >> user-setup.sql
        echo "  ALTER ROLE [dbmanager] ADD MEMBER [${appName}];" >> user-setup.sql
        echo "END" >> user-setup.sql
        echo "IF NOT EXISTS (SELECT * FROM sys.database_principals WHERE [name] = 'DisabledLogin')" >> user-setup.sql
        echo "BEGIN" >> user-setup.sql
        echo "  CREATE LOGIN [DisabledLogin] WITH PASSWORD = '${newPwd}';" >> user-setup.sql
        echo "  ALTER LOGIN [DisabledLogin] DISABLE;" >> user-setup.sql
        echo "END" >> user-setup.sql

    - name: 'Set up deployer service principal database roles'
      uses: azure/sql-action@v2.2.1
      with:
        connection-string: Server=${{ steps.deploy-shared-infrastructure.outputs.sqlServer1Name }}.database.windows.net;Initial Catalog=master;Authentication=Active Directory Default; Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;
        path: 'user-setup.sql'

    - name: Output ${{ inputs.infra-environment }} shared infra variable values
      shell: bash
      run: |
        echo "SQL_SERVER_NAME=${{ steps.deploy-shared-infrastructure.outputs.sqlServer1Name }}"
        echo "APP_SERVICE_PLAN_ID=${{ steps.deploy-shared-infrastructure.outputs.appServicePlan1Id }}"
