name: Deploy instance
description: Deploys an instance to an environment

inputs:
  azure-client-id:
    description: App ID of the deployment app registration
    required: true
  azure-tenant-id:
    description: ID of the target Azure AD tenant
    required: true
  azure-subscription-id:
    description: ID of the target Azure subscription
    required: true

  resource-prefix:
    description: Prefix to use for resource names
    required: true
  resource-group-name:
    description: Name of the resource group to deploy resources to
    required: true
  shared-resource-group-name:
    description: Name of the shared resource group
    required: true

  key-vault-resource-group-name:
    description: The resource group which contains the shared key vault used by Verified ID
    required: true
  key-vault-name:
    description: The name of the shared key vault used by Verified ID
    required: true
  dns-api-key:
    description: The API key to make calls to the DNS provider's API
    required: true
  dns-api-secret:
    description: The API secret to make calls to the DNS provider's API
    required: true

  organisation-name:
    description: The organisation name for Verified ID authority
  organisation-domain:
    description: The domain linked to Verified ID authority

  instance:
    description: The name of the instance
    required: true
  domain:
    description: The domain of the instance
    default: 'verifiedorchestration.com'
  audit-log-streaming-enabled:
    description: Whether to enable audit log streaming
    default: 'false'
  dev-tools-enabled:
    description: The flag indicating whether the dev tools (i.e. Apollo Sandbox, .etc) are deployed
  identity-issuers:
    description: Mapping of identity issuer identifiers to labels (JSON Record<string, string>)
  platform-consumer-apps:
    description: Mapping of app user OIDs to labels (JSON Record<string, string>)

  sql-server-name:
    description: Name of the SQL Server the instance will connect to
    required: true

  redis-cache-sku:
    description: SKU of the Azure Redis Cache
    required: true
  redis-cache-family:
    description: Family of the Azure Redis Cache
    required: true
  redis-cache-capacity:
    description: Capacity of the Azure Redis Cache
    required: true

  app-service-plan-id:
    description: ID of the App Service Plan to use as the serverFarmId for the app service(s)
    required: true
  node-env:
    description: NODE_ENV value to set for the running API instance
    required: true

  cors-origin:
    description: The value to use for API cors.origin setting (RegExp string[] of additional origins)
  api-cookie-secret:
    description: Cookie secret used by the cookie-session Express middleware
    required: true

  internal-client-secret:
    description: Client secret of the Internal app registration in Azure AD
    required: true
  vid-callback-client-secret:
    description: Client secret of the VID callback app registration in Azure AD
    required: true
  limited-access-client-secret:
    description: The client secret of the limited access client in Azure AD
    required: true
  limited-access-secret:
    description: The secret for limited access client data keys
    required: true
  home-tenant-id:
    description: The tenant ID of the home tenant
    required: true
  home-tenant-name:
    description: The name of the home tenant
    required: true
  home-tenant-graph-client-id:
    description: The client ID of the home tenant graph app registration
    required: true
  home-tenant-graph-client-secret:
    description: The client secret of the home tenant graph app registration
    required: true
  home-tenant-authority-id:
    description: The authority ID of the Verified ID service hosted in home tenant
    required: false
    default: ''
  home-tenant-vid-service-client-id:
    description: The client ID of the home tenant VID service app registration
    required: true
  home-tenant-vid-service-client-secret:
    description: The client secret of the home tenant VID service app registration
    required: true


  additional-auth-tenant-ids:
    description: JWT tokens issued by these tenant IDs are accepted by API in addition to the home tenant and platform tenant
outputs:
  api-url:
    description: URL of the deployed API
    value: https://${{ inputs.instance }}.api.${{ inputs.domain }}
  api-principal-id:
    description: Service principal ID of the API app service
    value: ${{ steps.instance-infra.outputs.apiAppServicePrincipalId }}
  api-app-service-name:
    description: Name of the API app service
    value: ${{ steps.instance-infra.outputs.apiAppServiceName }}
  database-host:
    description: Hostname of the deployed SQL database
    value: ${{ steps.instance-infra.outputs.databaseHost }}

runs:
  using: composite
  steps:
    - name: Log in to Azure
      uses: azure/login@v1
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}

    - name: Set current date as environment variable
      run: echo "NOW=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV
      shell: bash

    - name: Add instance app registration
      id: add-instance-app-registration
      shell: pwsh
      run: >-
        ./infrastructure/scripts/create-app-registration.ps1
        -Name 'Verified Orchestration (${{ inputs.instance }})'
        -IdentifierUri 'api://verifiedorchestration-api-${{ inputs.instance }}'

    - name: Add app registration for migration
      id: add-migration-app-registration
      shell: pwsh
      run: >-
        ./infrastructure/scripts/create-migration-app-registration.ps1
        -Name 'Verified Orchestration Migration (${{ inputs.instance }})'

    - name: Check for authority in Verified ID service
      id: check-vid-authority
      shell: pwsh
      run: >-
        ./infrastructure/scripts/check-verified-id-authority.ps1
        -HomeTenantAuthorityId '${{ inputs.home-tenant-authority-id }}'
        -LinkedDomainUrl 'https://${{ inputs.organisation-domain }}/'

    - name: Deploy storage account to host DID documents
      id: deploy-did-storage-account
      uses: azure/arm-deploy@v1
      if: steps.check-vid-authority.outputs.linkedDomainsVerified != 'True'
      with:
        deploymentName: ${{env.NOW}}-did-storage-github-actions
        resourceGroupName: ${{ inputs.resource-group-name }}
        template: ./infrastructure/verified-id-domain-verification-storage.bicep

    - name: Set up static website for hosting DID documents
      id: set-up-did-static-website
      shell: pwsh
      if: steps.check-vid-authority.outputs.linkedDomainsVerified != 'True'
      run: >-
        ./infrastructure/scripts/set-up-did-static-website.ps1
        -StorageAccountName '${{ steps.deploy-did-storage-account.outputs.storageAccountName }}'

    - name: Set up CDN with a custom domain and azure managed certificate for DID static website
      id: deploy-did-cdn
      uses: azure/arm-deploy@v1
      if: steps.check-vid-authority.outputs.linkedDomainsVerified != 'True'
      with:
        deploymentName: ${{env.NOW}}-did-cdn-github-actions
        resourceGroupName: ${{ inputs.resource-group-name }}
        template: ./infrastructure/verified-id-domain-verification-cdn.bicep
        parameters: >-
          resourcePrefix=${{ inputs.resource-prefix }}
          storageAccountWebEndpointDomainName=${{ steps.set-up-did-static-website.outputs.storageAccountWebEndpointDomainName }}
          customDomainName=${{ inputs.organisation-domain }}

    - name: Set up CNAME record for DID documents host
      id: set-up-did-cname-record
      shell: pwsh
      if: steps.check-vid-authority.outputs.isVoSubdomain == 'True' && steps.check-vid-authority.outputs.linkedDomainsVerified != 'True'
      run: >-
        ./infrastructure/scripts/set-up-dns-record.ps1
        -DnsApiKey '${{ inputs.dns-api-key }}'
        -DnsApiSecret '${{ inputs.dns-api-secret }}'
        -RecordType 'CNAME'
        -RecordName '${{ inputs.organisation-domain }}'
        -RecordValue '${{ steps.deploy-did-cdn.outputs.cdnEndpointHostName }}'

    - name: Set up TXT record for DID documents host
      id: set-up-did-txt-record
      shell: pwsh
      if: steps.check-vid-authority.outputs.isVoSubdomain == 'True' && steps.check-vid-authority.outputs.linkedDomainsVerified != 'True'
      run: >-
        ./infrastructure/scripts/set-up-dns-record.ps1
        -DnsApiKey '${{ inputs.dns-api-key }}'
        -DnsApiSecret '${{ inputs.dns-api-secret }}'
        -RecordType 'TXT'
        -RecordName '${{ steps.deploy-did-cdn.outputs.customDomainValidationDnsTxtRecordName }}'
        -RecordValue '${{ steps.deploy-did-cdn.outputs.customDomainValidationDnsTxtRecordValue }}'

    - name: Create authority in Verified ID service for the instance
      id: create-vid-authority
      shell: pwsh
      if: steps.check-vid-authority.outputs.authorityExists != 'True'
      run: >-
        ./infrastructure/scripts/set-up-verified-id-authority.ps1
        -TenantId '${{ inputs.azure-tenant-id }}'
        -SubscriptionId '${{ inputs.azure-subscription-id }}'
        -KeyVaultResourceGroupName '${{ inputs.key-vault-resource-group-name }}'
        -KeyVaultName '${{ inputs.key-vault-name }}'
        -OrganisationName '${{ inputs.organisation-name }}'
        -LinkedDomainUrl 'https://${{ inputs.organisation-domain }}/'

    - name: Instance infrastructure
      id: instance-infra
      uses: azure/arm-deploy@v1
      with:
        deploymentName: ${{env.NOW}}-api-github-actions
        resourceGroupName: ${{ inputs.resource-group-name }}
        template: ./infrastructure/instance.bicep
        parameters: >-
          resourcePrefix=${{ inputs.resource-prefix }}
          sqlServerName=${{ inputs.sql-server-name }}
          sharedResourceGroupName=${{ inputs.shared-resource-group-name }}
          redisCacheSKU=${{ inputs.redis-cache-sku }}
          redisCacheFamily=${{ inputs.redis-cache-family }}
          redisCacheCapacity=${{ inputs.redis-cache-capacity }}
          docsSiteClientId=${{ steps.add-instance-app-registration.outputs.instanceAppId }}
          docsSiteClientSecret=${{ steps.add-instance-app-registration.outputs.staticSiteSecret }}
          appServicePlanId=${{ inputs.app-service-plan-id }}
          nodeEnv=${{ inputs.node-env }}
          instance=${{ inputs.instance }}
          corsOrigin="${{ inputs.cors-origin }}"
          apiCookieSecret=${{ inputs.api-cookie-secret }}
          apiClientId=${{ steps.add-instance-app-registration.outputs.instanceAppId }}
          apiClientSecret=${{ steps.add-instance-app-registration.outputs.apiSecret }}
          apiClientUri=${{ steps.add-instance-app-registration.outputs.instanceAppIdentifierUri }}
          internalClientSecret=${{ inputs.internal-client-secret }}
          vidCallbackClientSecret=${{ inputs.vid-callback-client-secret }}
          limitedAccessClientSecret=${{ inputs.limited-access-client-secret }}
          limitedAccessSecret=${{ inputs.limited-access-secret }}
          homeTenantId=${{ inputs.home-tenant-id }}
          homeTenantName=${{ inputs.home-tenant-name }}
          homeTenantGraphClientId=${{ inputs.home-tenant-graph-client-id }}
          homeTenantGraphClientSecret=${{ inputs.home-tenant-graph-client-secret }}
          homeTenantVidServiceClientId=${{ inputs.home-tenant-vid-service-client-id }}
          homeTenantVidServiceClientSecret=${{ inputs.home-tenant-vid-service-client-secret }}
          vidAuthorityId=${{ steps.create-vid-authority.outputs.authorityId != '' && steps.create-vid-authority.outputs.authorityId || steps.check-vid-authority.outputs.authorityId}}
          devToolsEnabled=${{ inputs.dev-tools-enabled }}
          identityIssuers="${{ inputs.identity-issuers }}"
          platformConsumerApps="${{ inputs.platform-consumer-apps }}"
          additionalAuthTenantIds="${{ inputs.additional-auth-tenant-ids }}"

    - name: Log in to Azure again after potential long deployment
      uses: azure/login@v1
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}
        enable-AzPSSession: true

    - name: Set up CNAME record for API domain
      id: set-up-api-cname-record
      shell: pwsh
      run: >-
        ./infrastructure/scripts/set-up-dns-record.ps1
        -DnsApiKey '${{ inputs.dns-api-key }}'
        -DnsApiSecret '${{ inputs.dns-api-secret }}'
        -RecordType 'CNAME'
        -RecordName '${{ inputs.instance }}.api.${{ inputs.domain }}'
        -RecordValue '${{ steps.instance-infra.outputs.apiAppServiceDefaultHostname }}'

    - name: Set up TXT record for API domain
      id: set-up-api-txt-record
      shell: pwsh
      run: >-
        ./infrastructure/scripts/set-up-dns-record.ps1
        -DnsApiKey '${{ inputs.dns-api-key }}'
        -DnsApiSecret '${{ inputs.dns-api-secret }}'
        -RecordType 'TXT'
        -RecordName 'ausid.${{ inputs.instance }}.api.${{ inputs.domain }}'
        -RecordValue '${{ steps.instance-infra.outputs.apiAppServiceCustomDomainVerificationId }}'

    - name: Set up API domain
      id: set-up-api-domain
      uses: azure/arm-deploy@v1
      with:
        deploymentName: ${{env.NOW}}-api-domain-github-actions
        resourceGroupName: ${{ inputs.resource-group-name }}
        template: ./infrastructure/app-service-custom-domain.bicep
        parameters: >-
          appServiceName=${{ steps.instance-infra.outputs.apiAppServiceName }}
          domain=${{ inputs.instance }}.api.${{ inputs.domain }}

    - name: Set up CNAME record for docs site domain
      id: set-up-docs-cname-record
      shell: pwsh
      run: >-
        ./infrastructure/scripts/set-up-dns-record.ps1
        -DnsApiKey '${{ inputs.dns-api-key }}'
        -DnsApiSecret '${{ inputs.dns-api-secret }}'
        -RecordType 'CNAME'
        -RecordName '${{ inputs.instance }}.docs.${{ inputs.domain }}'
        -RecordValue '${{ steps.instance-infra.outputs.docsSiteDefaultHostname }}'

    - name: Set up docs site domain
      id: set-up-docs-domain
      uses: azure/arm-deploy@v1
      with:
        deploymentName: ${{env.NOW}}-docs-domain-github-actions
        resourceGroupName: ${{ inputs.resource-group-name }}
        template: ./infrastructure/static-site-custom-domain.bicep
        parameters: >-
          staticSiteName=${{ steps.instance-infra.outputs.docsSiteName }}
          domain=${{ inputs.instance }}.docs.${{ inputs.domain }}

    - name: Add API auth redirect URIs
      id: add-api-redirect-uris
      shell: pwsh
      run: >-
        ./infrastructure/scripts/add-redirect-uris-to-app-registration.ps1
        -AppRegistrationId ${{ steps.add-instance-app-registration.outputs.instanceAppId }}
        -WebRedirectUris https://${{ inputs.instance }}.api.${{ inputs.domain }}/auth
        -SpaRedirectUris https://${{ inputs.instance }}.${{ inputs.domain }}

    - name: Add docs site auth redirect URI
      id: add-docs-redirect-uris
      shell: pwsh
      run: >-
        ./infrastructure/scripts/add-redirect-uris-to-app-registration.ps1
        -AppRegistrationId ${{ steps.add-instance-app-registration.outputs.instanceAppId }}
        -WebRedirectUris https://${{ inputs.instance }}.docs.${{ inputs.domain }}/.auth/login/aad/callback

    - name: 'Create database service principal setup scripts'
      shell: bash
      run: |
        echo "IF NOT EXISTS (SELECT * FROM sys.database_principals WHERE [name] = '${{ steps.instance-infra.outputs.apiAppServiceName }}')" >> api-setup.sql
        echo "BEGIN" >> api-setup.sql
        echo "  CREATE USER [${{ steps.instance-infra.outputs.apiAppServiceName }}] FROM EXTERNAL PROVIDER;" >> api-setup.sql
        echo "  ALTER ROLE [db_datareader] ADD MEMBER [${{ steps.instance-infra.outputs.apiAppServiceName }}];" >> api-setup.sql
        echo "  ALTER ROLE [db_datawriter] ADD MEMBER [${{ steps.instance-infra.outputs.apiAppServiceName }}];" >> api-setup.sql
        echo "END" >> api-setup.sql

        echo "IF NOT EXISTS (SELECT * FROM sys.database_principals WHERE [name] = '${{ steps.add-migration-app-registration.outputs.migrationAppName }}')" >> migrations-setup.sql
        echo "BEGIN" >> migrations-setup.sql
        echo "  CREATE USER [${{ steps.add-migration-app-registration.outputs.migrationAppName }}] FROM EXTERNAL PROVIDER;" >> migrations-setup.sql
        echo "  ALTER ROLE [db_datareader] ADD MEMBER [${{ steps.add-migration-app-registration.outputs.migrationAppName }}];" >> migrations-setup.sql
        echo "  ALTER ROLE [db_datawriter] ADD MEMBER [${{ steps.add-migration-app-registration.outputs.migrationAppName }}];" >> migrations-setup.sql
        echo "  ALTER ROLE [db_ddladmin] ADD MEMBER [${{ steps.add-migration-app-registration.outputs.migrationAppName }}];" >> migrations-setup.sql
        echo "END" >> migrations-setup.sql

        appName=`az ad app list --app-id ${{ inputs.azure-client-id }} --query [].displayName --output tsv`
        echo "IF IS_MEMBER('db_owner') = 1" >> switch-db-owner.sql
        echo "BEGIN" >> switch-db-owner.sql
        echo "  ALTER AUTHORIZATION ON DATABASE::[${{inputs.resource-prefix}}-sql-db] TO [DisabledLogin];" >> switch-db-owner.sql
        echo "  DROP USER IF EXISTS [${appName}];" >> switch-db-owner.sql
        echo "END" >> switch-db-owner.sql

    - name: 'Set up API service principal database roles'
      uses: azure/sql-action@v2.2.1
      continue-on-error: true
      with:
        connection-string: Server=${{ steps.instance-infra.outputs.databaseHost }};Initial Catalog=${{inputs.resource-prefix}}-sql-db;Authentication=Active Directory Default; Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;
        path: 'api-setup.sql'

    - name: 'Set up Migrations app service principal database roles'
      uses: azure/sql-action@v2.2.1
      continue-on-error: true
      with:
        connection-string: Server=${{ steps.instance-infra.outputs.databaseHost }};Initial Catalog=${{inputs.resource-prefix}}-sql-db;Authentication=Active Directory Default; Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;
        path: 'migrations-setup.sql'

    - name: 'Switch database owner from deployer to a disabled login'
      uses: azure/sql-action@v2.2.1
      continue-on-error: true
      with:
        connection-string: Server=${{ steps.instance-infra.outputs.databaseHost }};Initial Catalog=${{inputs.resource-prefix}}-sql-db;Authentication=Active Directory Default; Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;
        path: 'switch-db-owner.sql'

    - name: Log in to Azure as migration app
      uses: azure/login@v1
      with:
        client-id: ${{ steps.add-migration-app-registration.outputs.migrationAppId }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        allow-no-subscriptions: true

    - name: Unzip migrations package
      shell: bash
      run: |
        unzip -qq migrations-package/migrations-package.zip -d ./migrations-package

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20.x

    - name: Run database migrations
      run: npm start
      working-directory: ./migrations-package
      shell: bash
      env:
        HOST: ${{ steps.instance-infra.outputs.databaseHost }}
        DATABASE: ${{inputs.resource-prefix}}-sql-db

    - name: Log back in to Azure as deployer after migration
      uses: azure/login@v1
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}
        enable-AzPSSession: true

    - name: Deploy API to App Service
      id: deploy-api
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ steps.instance-infra.outputs.apiAppServiceName }}
        package: api/api.zip

    - name: Unzip docs site
      shell: bash
      run: |
        unzip -qq docs-site/docs-site.zip -d ./docs-site

    - name: Install npm packages
      shell: bash
      run: npm ci
      working-directory: docs-site

    - name: Build docs site
      shell: bash
      env:
        GRAPHQL_ENDPOINT: https://${{ inputs.instance }}.api.${{ inputs.domain }}
        ADMIN_URL: https://${{ inputs.instance }}.${{ inputs.domain }}
        DEV_TOOLS_ENABLED: ${{ inputs.dev-tools-enabled }}
      run: |
        npm run build
        sed -i "s|TENANT_ID|${{ inputs.azure-tenant-id }}|g" ./build/staticwebapp.config.json
      # ^^^ replace the TENANT_ID placeholder with the home tenant ID
      working-directory: docs-site

    - name: Get deployment token for docs site
      shell: bash
      run: |
        DOCS_SITE_WEB_APPS_TOKEN=$(az staticwebapp secrets list --name ${{ steps.instance-infra.outputs.docsSiteName }} --query "properties.apiKey" --output tsv)
        echo "::add-mask::$DOCS_SITE_WEB_APPS_TOKEN"
        echo DOCS_SITE_WEB_APPS_TOKEN=$DOCS_SITE_WEB_APPS_TOKEN >> $GITHUB_ENV

    - name: Deploy docs site
      id: deploy-docs-site
      uses: Azure/static-web-apps-deploy@v1
      with:
        action: upload
        azure_static_web_apps_api_token: ${{ env.DOCS_SITE_WEB_APPS_TOKEN }}
        skip_app_build: true
        skip_api_build: true
        app_location: docs-site/build

    - name: Output DNS records to be set up
      id: output-did-dns-records
      shell: bash
      if: steps.check-vid-authority.outputs.isVoSubdomain != 'True' && steps.check-vid-authority.outputs.linkedDomainsVerified != 'True'
      run: |
        echo ""
        echo "--- DNS Records for Verified ID authority verification ---"
        echo "Type: CNAME"
        echo "Name: ${{ inputs.organisation-domain }}"
        echo "Data: ${{ steps.deploy-did-cdn.outputs.cdnEndpointHostName }}"
        echo "TTL: 3600"
        echo "---"
        echo "Type: TXT"
        echo "Name: ${{ steps.deploy-did-cdn.outputs.customDomainValidationDnsTxtRecordName }}"
        echo "Data: ${{ steps.deploy-did-cdn.outputs.customDomainValidationDnsTxtRecordValue }}"
        echo "TTL: 3600"

    - name: Verify authority in Verified ID service for the instance
      id: verify-vid-authority
      shell: pwsh
      if: steps.check-vid-authority.outputs.linkedDomainsVerified != 'True'
      run: >-
        ./infrastructure/scripts/verify-verified-id-authority.ps1
        -TenantId '${{ inputs.azure-tenant-id }}'
        -ResourceGroupName '${{ inputs.resource-group-name}}'
        -LinkedDomainUrl 'https://${{ inputs.organisation-domain }}/'
        -StorageAccountName '${{ steps.deploy-did-storage-account.outputs.storageAccountName }}'

    - name: Log back in to Azure as deployer after interactive login session for VID verification
      uses: azure/login@v1
      if: steps.check-vid-authority.outputs.linkedDomainsVerified != 'True'
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}
        enable-AzPSSession: true

    - name: Set up audit log streaming
      id: audit-log-streaming
      uses: azure/arm-deploy@v1
      if: inputs.audit-log-streaming-enabled == 'true'
      with:
        deploymentName: ${{env.NOW}}-audit-log-streaming
        resourceGroupName: ${{ inputs.resource-group-name }}
        template: ./infrastructure/audit-log-streaming.bicep
        parameters: >-
          resourcePrefix=${{ inputs.resource-prefix }}

