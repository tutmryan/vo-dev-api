name: Resource group
description: Deploys a resource group

inputs:
  azure-client-id:
    description: App ID of the deployment app registration
    required: true
  azure-tenant-id:
    description: ID of the target Azure AD tenant
    required: true
  azure-subscription-id:
    description: ID of the target Azure subscription
    required: true
  resource-group-name:
    description: Name of the resource group
    required: true
  resource-group-location:
    description: Location of the resource group
    required: true

runs:
  using: composite
  steps:
    - name: Log in to Azure
      uses: azure/login@v1
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}

    - name: Set current date as environment variable
      run: echo "NOW=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV
      shell: bash

    - name: Deploy resource group
      id: deploy-resource-group
      uses: azure/arm-deploy@v1
      with:
        deploymentName: ${{env.NOW}}-resource-group-github-actions
        scope: subscription
        region: ${{ inputs.resource-group-location }}
        template: ./infrastructure/resource-group.bicep
        parameters: >-
          resourceGroupName=${{ inputs.resource-group-name }}
          resourceGroupLocation=${{ inputs.resource-group-location }}

