name: SQL DB instance
description: Deploys a SQL DB instance to the specified server

inputs:
  resource-prefix:
    description: Prefix to use for resource names
    required: true
  sql-server-name:
    description: Name of the SQL Server to deploy the database to
    required: true
  elastic-pool-name:
    description: Name of the elastic pool to deploy the database to
    required: true

runs:
  using: composite
  steps:
    - name: Set current date as environment variable
      run: echo "NOW=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV
      shell: bash

    - name: 'Set up database script'
      shell: bash
      run: |
        echo "IF NOT EXISTS (SELECT * FROM sys.databases WHERE [name] = '${{ inputs.resource-prefix }}-sql-db')" >> database-setup.sql
        echo "BEGIN" >> database-setup.sql
        echo "  CREATE DATABASE [${{ inputs.resource-prefix }}-sql-db] ( SERVICE_OBJECTIVE = ELASTIC_POOL ( name = [${{ inputs.elastic-pool-name }}] ) ) ;" >> database-setup.sql
        echo "END" >> database-setup.sql

    - name: 'Create database'
      uses: azure/sql-action@v2.2.1
      with:
        connection-string: Server=${{ inputs.sql-server-name }}.database.windows.net;Initial Catalog=master;Authentication=Active Directory Default; Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;
        path: 'database-setup.sql'


