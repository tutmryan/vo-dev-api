name: SQL DB instance
description: Deploys a SQL DB instance to the specified server

inputs:
  azure-client-id:
    description: App ID of the deployment app registration
    required: true
  azure-tenant-id:
    description: ID of the target Azure AD tenant
    required: true
  azure-subscription-id:
    description: ID of the target Azure subscription
    required: true
  resource-group-name:
    description: Name of the resource group to deploy resources to
    required: true
  resource-prefix:
    description: Prefix to use for resource names
    required: true
  sql-server-name:
    description: Name of the SQL Server to deploy the database to
    required: true
  elastic-pool-name:
    description: Name of the elastic pool to deploy the database to
    required: true
  log-analytics-id:
    description: ID of the log analytics workspace to send logs to
    required: true

runs:
  using: composite
  steps:
    - name: Log in to Azure
      uses: azure/login@v1
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}

    - name: Set current date as environment variable
      run: echo "NOW=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV
      shell: bash

    - name: 'Set up database script'
      shell: bash
      run: |
        echo "SELECT SYSTEM_USER" >> database-setup.sql
        echo "SELECT SUSER_NAME()" >> database-setup.sql
        echo "SELECT CURRENT_USER" >> database-setup.sql
        echo "IF NOT EXISTS (SELECT * FROM sys.databases WHERE [name] = '${{ inputs.resource-prefix }}-sql-db')" >> database-setup.sql
        echo "BEGIN" >> database-setup.sql
        echo "  CREATE DATABASE [${{ inputs.resource-prefix }}-sql-db] ( SERVICE_OBJECTIVE = ELASTIC_POOL ( name = [${{ inputs.elastic-pool-name }}] ) ) ;" >> database-setup.sql
        echo "END" >> database-setup.sql
        cat database-setup.sql

    - name: 'Create database'
      uses: azure/sql-action@v2.2.1
      with:
        connection-string: Server=${{ inputs.sql-server-name }}.database.windows.net;Initial Catalog=master;Authentication=Active Directory Default; Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;
        path: 'database-setup.sql'

    - name: Deploy SQL DB instance
      id: deploy-sql-db
      uses: azure/arm-deploy@v1
      with:
        deploymentName: ${{env.NOW}}-sql-db-github-actions
        resourceGroupName: ${{ inputs.resource-group-name }}
        template: ./infrastructure/sql-db.bicep
        parameters: >-
          resourcePrefix=${{ inputs.resource-prefix }}
          sqlServerName=${{ inputs.sql-server-name }}
          logAnalyticsId=${{ inputs.log-analytics-id }}

