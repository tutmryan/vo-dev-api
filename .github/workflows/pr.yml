name: Pull Request

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  ci-api:
    name: CI API
    uses: makerxstudio/shared-config/.github/workflows/node-ci.yml@main
    with:
      node-version: '18.x'
      npm-auth-token: ${{ secrets.NPM_AUTH_TOKEN }}

