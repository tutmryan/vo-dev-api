name: Pull Request

on:
  pull_request:
    branches:
      - main
      - "feature/**"

permissions:
  contents: read
  checks: write

jobs:
  ci-api:
    if: github.actor != 'dependabot[bot]'
    name: CI API
    uses: makerxstudio/shared-config/.github/workflows/node-ci.yml@main
    with:
      node-version: 22.x
      audit-script: npm run audit
      pre-test-script: npm run test:ci:start-db
      test-script: npm run test:ci
      output-test-results: true

  ci-migrations-package:
    if: github.actor != 'dependabot[bot]'
    name: CI Migrations Package
    uses: makerxstudio/shared-config/.github/workflows/node-ci.yml@main
    with:
      node-version: 22.x
      audit-script: npm run audit
      working-directory: ./migrate-db

  ci-docs-site:
    if: github.actor != 'dependabot[bot]'
    name: CI Docs Site
    uses: makerxstudio/shared-config/.github/workflows/node-ci.yml@main
    with:
      node-version: 22.x
      audit-script: npm run audit
      working-directory: ./docs-site
      run-build: true
      build-script: npm run build:pr
