name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:

  ci-api:
    name: CI API
    uses: makerxstudio/shared-config/.github/workflows/node-ci.yml@main
    with:
      node-version: 20.x
      audit-script: npm run audit
      pre-test-script: npm run test:ci:start-db
      test-script: npm run test:ci

  ci-migrations-package:
    name: CI Migrations Package
    uses: makerxstudio/shared-config/.github/workflows/node-ci.yml@main
    with:
      node-version: 20.x
      audit-script: npm run audit
      working-directory: ./migrate-db

  ci-docs-site:
    name: CI Docs Site
    uses: makerxstudio/shared-config/.github/workflows/node-ci.yml@main
    with:
      node-version: 20.x
      audit-script: npm run audit
      working-directory: ./docs-site

  build-api:
    name: Build API
    needs:
      - ci-api
    uses: makerxstudio/shared-config/.github/workflows/node-build-zip.yml@main
    with:
      node-version: 20.x
      artifact-name: api

  build-migrations-package:
    name: Build Migrations Package
    needs:
      - ci-migrations-package
    uses: makerxstudio/shared-config/.github/workflows/node-build-zip.yml@main
    with:
      node-version: 20.x
      working-directory: ./migrate-db
      artifact-name: migrations-package

  prepare-docs-site:
    name: Prepare Docs Site
    # ^^ this means generate GraphQL docs + zip
    runs-on: ubuntu-latest
    needs:
      - ci-docs-site
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: ./docs-site/package-lock.json

      - name: Install npm packages
        shell: bash
        run: npm ci
        working-directory: ./docs-site

      - name: Generate GraphQL docs
        shell: bash
        run: npm run generate-graphql-docs
        working-directory: ./docs-site

      - name: Delete node_modules
        run: rm -rf ./docs-site/node_modules

      - name: Zip docs site
        run: pushd ./docs-site; zip -q -r docs-site.zip *

      - name: Upload docs site artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: ./docs-site/docs-site.zip
          if-no-files-found: error

  upload-other-artifacts:
    name: Upload other artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Upload infrastructure artifact
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure
          path: ./infrastructure
          if-no-files-found: error

      - name: Upload github-actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-actions
          path: ./.github/actions
          if-no-files-found: error

  deploy-to-non-prod:
    name: Deploy to non-production environment
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    needs:
      - build-api
      - build-migrations-package
      - prepare-docs-site
      - upload-other-artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - instance: demo
            resourceGroup: vo-demo-instance
            resourcePrefix: vo-demo
          - instance: dev
            resourceGroup: vo-dev-instance
            resourcePrefix: vo-dev
          - instance: demo.nelnet
            resourceGroup: vo-demo-nelnet-instance
            resourcePrefix: vo-demo-nelnet
          - instance: demo.komainu
            resourceGroup: vo-demo-komainu-instance
            resourcePrefix: vo-demo-komainu
          - instance: demo.openlearning
            resourceGroup: vo-demo-openlearning-instance
            resourcePrefix: vo-demo-openlearning
    environment:
      name: ${{ matrix.instance }}
      url: ${{ matrix.instance }}.verifiedorchestration.com
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.NON_PROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.NON_PROD_AZURE_TENANT_ID }}
          subscription-id: ${{ vars.NON_PROD_AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true
      - name: Instance resource group
        id: instance-resource-group
        uses: ./github-actions/resource-group
        with:
          resource-group-name: ${{ matrix.resourceGroup }}
          resource-group-location: australiaeast
      - name: Instance log analytics
        id: instance-log-analytics
        uses: ./github-actions/log-analytics
        with:
          resource-group-name: ${{ matrix.resourceGroup }}
          resource-prefix: ${{ matrix.resourcePrefix }}
      - name: Add temporary SQL firewall rule
        id: add-temporary-sql-firewall-rule
        uses: ./github-actions/sql-firewall-rule-add
        with:
          resource-group-name: vo-nonprd-platform-shared-infra
          sql-server-name: ${{ vars.SQL_SERVER_NAME }}
          rule-name-prefix: '${{ matrix.resourcePrefix}}-${{ github.run_id }}'
      - name: Instance SQL database
        id: instance-sql-db
        uses: ./github-actions/sql-db
        with:
          resource-prefix: ${{ matrix.resourcePrefix }}
          sql-server-name: ${{ vars.SQL_SERVER_NAME }}
          elastic-pool-name: ${{ vars.SQL_ELASTIC_POOL_NAME }}
      - name: Deploy instance
        id: deploy-instance
        uses: ./github-actions/instance
        with:
          instance: ${{ matrix.instance }}
          node-env: nonprod
          audit-log-streaming-enabled: ${{ vars.AUDIT_LOG_STREAMING_ENABLED }}
          dev-tools-enabled: ${{ vars.DEV_TOOLS_ENABLED }}
          face-check-enabled: ${{ vars.FACE_CHECK_ENABLED }}
          identity-issuers: "${{ vars.IDENTITY_ISSUERS }}"
          platform-consumer-apps: "${{ vars.PLATFORM_CONSUMER_APPS }}"

          azure-client-id: ${{ vars.NON_PROD_AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ vars.NON_PROD_AZURE_TENANT_ID }}
          azure-subscription-id: ${{ vars.NON_PROD_AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ matrix.resourceGroup }}
          resource-prefix: ${{ matrix.resourcePrefix }}

          key-vault-resource-group-name: ${{ vars.NON_PROD_KEY_VAULT_RESOURCE_GROUP_NAME }}
          key-vault-name: ${{ vars.NON_PROD_KEY_VAULT_NAME }}
          dns-api-key: ${{ secrets.NON_PROD_DNS_API_KEY }}
          dns-api-secret: ${{ secrets.NON_PROD_DNS_API_SECRET }}

          organisation-name: ${{ vars.VID_AUTHORITY_NAME }}
          organisation-domain: ${{ vars.VID_AUTHORITY_DOMAIN }}

          sql-server-name: ${{ vars.SQL_SERVER_NAME }}
          shared-resource-group-name: vo-nonprd-platform-shared-infra
          app-service-plan-id: ${{ vars.APP_SERVICE_PLAN_ID }}
          redis-cache-sku: Basic
          redis-cache-family: C
          redis-cache-capacity: 0

          cors-origin: "${{ vars.CORS_ORIGIN }}"
          api-cookie-secret: ${{ secrets.API_COOKIE_SECRET }}

          internal-client-secret: ${{ secrets.NON_PROD_INTERNAL_CLIENT_SECRET }}
          vid-callback-client-secret: ${{ secrets.NON_PROD_VID_CALLBACK_CLIENT_SECRET }}

          limited-access-client-secret: ${{ secrets.NON_PROD_LIMITED_ACCESS_CLIENT_SECRET }}
          limited-access-secret: ${{ secrets.LIMITED_ACCESS_SECRET }}

          limited-approval-client-secret: ${{ secrets.NON_PROD_LIMITED_APPROVAL_CLIENT_SECRET }}
          limited-approval-secret: ${{ secrets.LIMITED_APPROVAL_SECRET }}

          limited-photo-capture-client-secret: ${{ secrets.NON_PROD_LIMITED_PHOTO_CAPTURE_CLIENT_SECRET }}
          limited-photo-capture-secret: ${{ secrets.LIMITED_PHOTO_CAPTURE_SECRET }}

          home-tenant-id: ${{ vars.HOME_TENANT_ID }}
          home-tenant-name: ${{ vars.HOME_TENANT_NAME }}
          home-tenant-graph-client-id: ${{ vars.HOME_TENANT_GRAPH_CLIENT_ID }}
          home-tenant-graph-client-secret: ${{ secrets.HOME_TENANT_GRAPH_CLIENT_SECRET }}
          home-tenant-authority-id: ${{ vars.HOME_TENANT_AUTHORITY_ID }}
          home-tenant-vid-service-client-id: ${{ vars.HOME_TENANT_VID_SERVICE_CLIENT_ID }}
          home-tenant-vid-service-client-secret: ${{ secrets.HOME_TENANT_VID_SERVICE_CLIENT_SECRET }}
          additional-auth-tenant-ids: "${{ vars.ADDITIONAL_AUTH_TENANT_IDS }}"
      - name: Instance SQL database audit
        id: instance-sql-db-audit
        uses: ./github-actions/sql-db-audit
        with:
          resource-group-name: vo-nonprd-platform-shared-infra
          resource-prefix: ${{ matrix.resourcePrefix }}
          sql-server-name: ${{ vars.SQL_SERVER_NAME }}
          log-analytics-id: ${{ steps.instance-log-analytics.outputs.log-analytics-id }}
      - name: Remove temporary SQL firewall rule
        id: remove-temporary-sql-firewall-rule
        if: always()
        uses: ./github-actions/sql-firewall-rule-remove
        with:
          resource-group-name: vo-nonprd-platform-shared-infra
          sql-server-name: ${{ vars.SQL_SERVER_NAME }}
          rule-name: ${{ steps.add-temporary-sql-firewall-rule.outputs.rule-name }}

  deploy-to-prod:
    name: Deploy to prod environment
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    needs:
      - build-api
      - build-migrations-package
      - prepare-docs-site
      - upload-other-artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - instance: sandbox.partner
            resourceGroup: vo-sandbox-partner-instance
            resourcePrefix: vo-sandbox-partner
          - instance: partner
            resourceGroup: vo-partner-instance
            resourcePrefix: vo-partner
          - instance: sandbox.pentest
            resourceGroup: vo-sandbox-pentest-instance
            resourcePrefix: vo-sandbox-pentest
          - instance: pentest
            resourceGroup: vo-pentest-instance
            resourcePrefix: vo-pentest
          - instance: sandbox.dribl
            resourceGroup: vo-sandbox-dribl-instance
            resourcePrefix: vo-sandbox-dribl
          - instance: barhead
            resourceGroup: vo-barhead-instance
            resourcePrefix: vo-barhead
          - instance: sandbox.barhead
            resourceGroup: vo-sandbox-barhead-instance
            resourcePrefix: vo-sandbox-barhead
          - instance: sandbox.thoughtworksau
            resourceGroup: vo-sandbox-thoughtworksau-instance
            resourcePrefix: vo-sandbox-thoughtworksau
          - instance: sandbox.mantel
            resourceGroup: vo-sandbox-mantel-instance
            resourcePrefix: vo-sandbox-mantel
          - instance: sandbox.alyve
            resourceGroup: vo-sandbox-alyve-instance
            resourcePrefix: vo-sandbox-alyve
          - instance: sandbox.anz
            resourceGroup: vo-sandbox-anz-instance
            resourcePrefix: vo-sandbox-anz
          - instance: sandbox.scw
            resourceGroup: vo-sandbox-scw-instance
            resourcePrefix: vo-sandbox-scw
          - instance: sandbox.cybernexus
            resourceGroup: vo-sandbox-cybernexus-instance
            resourcePrefix: vo-sandbox-cybernexus
          - instance: sandbox.devops1
            resourceGroup: vo-sandbox-devops1-instance
            resourcePrefix: vo-sandbox-devops1

    environment:
      name: ${{ matrix.instance }}
      url: ${{ matrix.instance }}.verifiedorchestration.com
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.PROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.PROD_AZURE_TENANT_ID }}
          subscription-id: ${{ vars.PROD_AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true
      - name: Instance resource group
        id: instance-resource-group
        uses: ./github-actions/resource-group
        with:
          resource-group-name: ${{ matrix.resourceGroup }}
          resource-group-location: australiaeast
      - name: Instance log analytics
        id: instance-log-analytics
        uses: ./github-actions/log-analytics
        with:
          resource-group-name: ${{ matrix.resourceGroup }}
          resource-prefix: ${{ matrix.resourcePrefix }}
      - name: Add temporary SQL firewall rule
        id: add-temporary-sql-firewall-rule
        uses: ./github-actions/sql-firewall-rule-add
        with:
          resource-group-name: vo-platform-shared-infra
          sql-server-name: ${{ vars.SQL_SERVER_NAME }}
          rule-name-prefix: '${{ matrix.resourcePrefix }}-${{ github.run_id }}'
      - name: Instance SQL database
        id: instance-sql-db
        uses: ./github-actions/sql-db
        with:
          resource-prefix: ${{ matrix.resourcePrefix }}
          sql-server-name: ${{ vars.SQL_SERVER_NAME }}
          elastic-pool-name: ${{ vars.SQL_ELASTIC_POOL_NAME }}
      - name: Deploy instance
        id: deploy-instance
        uses: ./github-actions/instance
        with:
          instance: ${{ matrix.instance }}
          node-env: production
          audit-log-streaming-enabled: ${{ vars.AUDIT_LOG_STREAMING_ENABLED }}
          dev-tools-enabled: ${{ vars.DEV_TOOLS_ENABLED }}
          face-check-enabled: ${{ vars.FACE_CHECK_ENABLED }}
          identity-issuers: "${{ vars.IDENTITY_ISSUERS }}"
          platform-consumer-apps: "${{ vars.PLATFORM_CONSUMER_APPS }}"

          azure-client-id: ${{ vars.PROD_AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ vars.PROD_AZURE_TENANT_ID }}
          azure-subscription-id: ${{ vars.PROD_AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ matrix.resourceGroup }}
          resource-prefix: ${{ matrix.resourcePrefix }}

          key-vault-resource-group-name: ${{ vars.PROD_KEY_VAULT_RESOURCE_GROUP_NAME }}
          key-vault-name: ${{ vars.PROD_KEY_VAULT_NAME }}
          dns-api-key: ${{ secrets.PROD_DNS_API_KEY }}
          dns-api-secret: ${{ secrets.PROD_DNS_API_SECRET }}

          organisation-name: ${{ vars.VID_AUTHORITY_NAME }}
          organisation-domain: ${{ vars.VID_AUTHORITY_DOMAIN }}

          sql-server-name: ${{ vars.SQL_SERVER_NAME }}
          shared-resource-group-name: vo-platform-shared-infra
          app-service-plan-id: ${{ vars.APP_SERVICE_PLAN_ID }}
          redis-cache-sku: Basic
          redis-cache-family: C
          redis-cache-capacity: 0

          cors-origin: "${{ vars.CORS_ORIGIN }}"
          api-cookie-secret: ${{ secrets.API_COOKIE_SECRET }}

          internal-client-secret: ${{ secrets.PROD_INTERNAL_CLIENT_SECRET }}
          vid-callback-client-secret: ${{ secrets.PROD_VID_CALLBACK_CLIENT_SECRET }}

          limited-access-client-secret: ${{ secrets.PROD_LIMITED_ACCESS_CLIENT_SECRET }}
          limited-access-secret: ${{ secrets.LIMITED_ACCESS_SECRET }}

          limited-approval-client-secret: ${{ secrets.PROD_LIMITED_APPROVAL_CLIENT_SECRET }}
          limited-approval-secret: ${{ secrets.LIMITED_APPROVAL_SECRET }}

          limited-photo-capture-client-secret: ${{ secrets.PROD_LIMITED_PHOTO_CAPTURE_CLIENT_SECRET }}
          limited-photo-capture-secret: ${{ secrets.LIMITED_PHOTO_CAPTURE_SECRET }}

          home-tenant-id: ${{ vars.HOME_TENANT_ID }}
          home-tenant-name: ${{ vars.HOME_TENANT_NAME }}
          home-tenant-graph-client-id: ${{ vars.HOME_TENANT_GRAPH_CLIENT_ID }}
          home-tenant-graph-client-secret: ${{ secrets.HOME_TENANT_GRAPH_CLIENT_SECRET }}
          home-tenant-authority-id: ${{ vars.HOME_TENANT_AUTHORITY_ID }}
          home-tenant-vid-service-client-id: ${{ vars.HOME_TENANT_VID_SERVICE_CLIENT_ID }}
          home-tenant-vid-service-client-secret: ${{ secrets.HOME_TENANT_VID_SERVICE_CLIENT_SECRET }}
          additional-auth-tenant-ids: "${{ vars.ADDITIONAL_AUTH_TENANT_IDS }}"
      - name: Instance SQL database audit
        id: instance-sql-db-audit
        uses: ./github-actions/sql-db-audit
        with:
          resource-group-name: vo-platform-shared-infra
          resource-prefix: ${{ matrix.resourcePrefix }}
          sql-server-name: ${{ vars.SQL_SERVER_NAME }}
          log-analytics-id: ${{ steps.instance-log-analytics.outputs.log-analytics-id }}
      - name: Remove temporary SQL firewall rule
        id: remove-temporary-sql-firewall-rule
        if: always()
        uses: ./github-actions/sql-firewall-rule-remove
        with:
          resource-group-name: vo-platform-shared-infra
          sql-server-name: ${{ vars.SQL_SERVER_NAME }}
          rule-name: ${{ steps.add-temporary-sql-firewall-rule.outputs.rule-name }}
