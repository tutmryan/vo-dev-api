name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs-site/**'
      - 'src/generated/schema.json'
      - 'src/roles.ts'
      - 'src/__snapshots__/shield.test.ts.snap'
      - 'src/audit-types.ts'
      - 'infrastructure/scripts/app-roles.json'
      - '.github/workflows/deploy-docs.yml'
      - 'fly.docs-site.toml'
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read

jobs:
  deploy-dev:
    name: Deploy to Fly (dev)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    environment: docs-dev
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: |
          flyctl deploy . \
            -a docs-site-dev \
            --config fly.docs-site.toml \
            --env DOCS_SITE_URL=docs-dev.idbyvo.com \
            --env DOCS_SITE_URL_OLD=docs-dev.verifiedorchestration.com \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            --label org.opencontainers.image.ref.name=${{ github.ref }}
          flyctl scale count 1 -a docs-site-dev -y
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DOCS_DEV }}

  deploy-prod:
    name: Deploy to Fly (prod)
    runs-on: ubuntu-latest
    if: (github.event_name == 'release' && startsWith(github.ref, 'refs/tags/docs-v')) || (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
    environment: docs-prod
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: |
          flyctl deploy . \
            -a docs-site \
            --config fly.docs-site.toml \
            --env DOCS_SITE_URL=docs.idbyvo.com \
            --env DOCS_SITE_URL_OLD=docs.verifiedorchestration.com \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            --label org.opencontainers.image.ref.name=${{ github.ref }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DOCS_PROD }}
