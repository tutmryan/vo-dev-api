name: Deploy Docs
run-name: |
  ${{ 
    github.event_name == 'push' && format('Deploy {0} to dev', github.ref_name) ||
    github.event_name == 'release' && format('Deploy {0} to prod', github.ref_name) ||
    format('Deploy {0} to {1}{2}', github.ref_name, inputs.environment, inputs.purge_cache && ' and purge cache' || '')
  }}

on:
  push:
    branches:
      - main
    paths:
      - 'docs-site/**'
      - 'src/generated/schema.json'
      - 'src/roles.ts'
      - 'src/__snapshots__/shield.test.ts.snap'
      - 'src/audit-types.ts'
      - 'infrastructure/scripts/app-roles.json'
      - '.github/workflows/deploy-docs.yml'
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - dev
          - prod
      purge_cache:
        description: "Purge site cache post deployment"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy-dev:
    name: Deploy to Azure (dev)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    environment: docs-dev
    concurrency:
      group: deploy-docs-dev
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Get current time
        id: time
        run: |
          time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "time=$time" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docs site
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docs-site/Dockerfile
          target: export
          push: false
          outputs: type=local,dest=.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.NON_PROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.NON_PROD_AZURE_TENANT_ID }}
          subscription-id: ${{ vars.NON_PROD_AZURE_SUBSCRIPTION_ID }}

      - name: Upload to Azure Storage
        run: |
          az storage blob upload-batch \
            --account-name ${{ vars.DOCS_AZURE_STORAGE_ACCOUNT_NAME }} \
            --auth-mode login \
            --destination '$web' \
            --source ./build \
            --overwrite

      - name: Delete old files
        run: |
          az storage blob delete-batch \
            --account-name ${{ vars.DOCS_AZURE_STORAGE_ACCOUNT_NAME }} \
            --auth-mode login \
            --source '$web' \
            --if-unmodified-since "${{ steps.time.outputs.time }}"

  purge-cache-dev:
    name: Purge CDN Cache (dev)
    runs-on: ubuntu-latest
    needs: deploy-dev
    concurrency:
      group: deploy-docs-dev
      cancel-in-progress: false
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.purge_cache) || 
      vars.ENABLE_SITE_CACHE_PURGE == 'true'
    environment: docs-dev
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.NON_PROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.NON_PROD_AZURE_TENANT_ID }}
          subscription-id: ${{ vars.NON_PROD_AZURE_SUBSCRIPTION_ID }}

      - name: Purge CDN cache
        run: |
          az afd endpoint purge \
            --resource-group vo-dev-rg-docs \
            --profile-name ${{ vars.DOCS_CDN_PROFILE_NAME }} \
            --endpoint-name ${{ vars.DOCS_CDN_ENDPOINT_NAME }} \
            --domains ${{ vars.DOCS_CDN_DOMAIN_NAME }} \
            --content-paths "/*"

  deploy-prod:
    name: Deploy to Azure (prod)
    runs-on: ubuntu-latest
    if: (github.event_name == 'release' && startsWith(github.ref, 'refs/tags/docs-v')) || (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
    environment: docs-prod
    concurrency:
      group: deploy-docs-prod
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Get current time
        id: time
        run: |
          time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "time=$time" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docs site
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docs-site/Dockerfile
          target: export
          push: false
          outputs: type=local,dest=.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.PROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.PROD_AZURE_TENANT_ID }}
          subscription-id: ${{ vars.PROD_AZURE_SUBSCRIPTION_ID }}

      - name: Upload to Azure Storage
        run: |
          az storage blob upload-batch \
            --account-name ${{ vars.DOCS_AZURE_STORAGE_ACCOUNT_NAME }} \
            --auth-mode login \
            --destination '$web' \
            --source ./build \
            --overwrite
        
      - name: Delete old files
        run: |
          az storage blob delete-batch \
            --account-name ${{ vars.DOCS_AZURE_STORAGE_ACCOUNT_NAME }} \
            --auth-mode login \
            --source '$web' \
            --if-unmodified-since "${{ steps.time.outputs.time }}"

  purge-cache-prod:
    name: Purge CDN Cache (prod)
    runs-on: ubuntu-latest
    needs: deploy-prod
    concurrency:
      group: deploy-docs-prod
      cancel-in-progress: false
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.purge_cache) || 
      vars.ENABLE_SITE_CACHE_PURGE == 'true'
    environment: docs-prod
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.PROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.PROD_AZURE_TENANT_ID }}
          subscription-id: ${{ vars.PROD_AZURE_SUBSCRIPTION_ID }}

      - name: Purge CDN cache
        run: |
          az afd endpoint purge \
            --resource-group vo-prod-rg-docs \
            --profile-name ${{ vars.DOCS_CDN_PROFILE_NAME }} \
            --endpoint-name ${{ vars.DOCS_CDN_ENDPOINT_NAME }} \
            --domains ${{ vars.DOCS_CDN_DOMAIN_NAME }} \
            --content-paths "/*"
