# eslint-disable @graphql-eslint/strict-id-in-types

# eslint-disable @graphql-eslint/require-description

"""
The status of the presentation flow.
"""
enum PresentationFlowStatus {
  PENDING
  REQUEST_CREATED
  REQUEST_RETRIEVED
  PRESENTATION_VERIFIED
  SUBMITTED
  EXPIRED
  CANCELLED
}

"""
The notification status of the presentation flow.
"""
enum PresentationFlowNotificationStatus {
  """
  No notification configured for this presentation flow.
  """
  NONE
  """
  Notification job is queued but not yet sent.
  """
  PENDING
  """
  Notification was successfully sent.
  """
  SENT
  """
  Notification failed to send.
  """
  FAILED
}

"""
The supported data entry field types.
"""
enum DataType {
  boolean
  select
  text
  number
}

type DataOption {
  id: String!
  label: String!
}

input DataOptionInput {
  label: String!
}

type DataConstraints {
  min: Float
  max: Float
  minLength: Int
  maxLength: Int
  pattern: String
}

input DataConstraintsInput {
  min: Float
  max: Float
  minLength: Int
  maxLength: Int
  pattern: String
}

type DataDefinition {
  id: String!
  type: DataType!
  label: String!
  required: Boolean!
  allowMultiple: Boolean
  options: [DataOption!]
  constraints: DataConstraints
}

input DataDefinitionInput {
  type: DataType!
  label: String!
  required: Boolean!
  allowMultiple: Boolean
  options: [DataOptionInput!]
  constraints: DataConstraintsInput
}

type Action {
  key: String!
  label: String!
}

input ActionInput {
  key: String!
  label: String!
}

"""
Input defining the presentation flow contact information for notifications.
"""
input PresentationFlowContactInput {
  """
  How the presentation flow notification should be sent.
  Set to null to remove the notification.
  """
  notification: ContactInput
}

input PresentationFlowInput {
  identityId: ID
  correlationId: ID
  templateId: ID
  title: String
  expiresAt: DateTime
  prePresentationText: Markdown
  postPresentationText: Markdown
  requestData: JSONObject
  presentationRequest: PresentationRequestInput!
  dataSchema: [DataDefinitionInput!]
  actions: [ActionInput!]
  autoSubmit: Boolean
  callback: Callback
  """
  The contact information for sending notifications about this presentation flow.
  When provided, a notification will be sent to the recipient.
  """
  contact: PresentationFlowContactInput
}

type PresentationFlowResponse {
  callbackSecret: String!
  request: PresentationFlow!
}

"""
Represents the presentation flow contact information.
"""
type PresentationFlowContact {
  """
  The notification contact information.
  """
  notification: Contact
}

"""
A presentation flow.
"""
type PresentationFlow {
  id: ID!
  title: String
  portalUrl: String!
  identity: Identity
  expiresAt: DateTime!
  prePresentationText: Markdown
  postPresentationText: Markdown
  requestData: JSONObject
  presentationRequest: JSONObject!
  dataSchema: [DataDefinition!]
  dataResults: JSONObject
  actions: [Action!]
  autoSubmit: Boolean
  action: Action
  presentation: Presentation
  isCancelled: Boolean
  isSubmitted: Boolean
  template: PresentationFlowTemplate
  status: PresentationFlowStatus!
  createdBy: User!
  createdAt: DateTime!
  updatedBy: User
  updatedAt: DateTime
  """
  Indicates whether this presentation flow has contact notification details set.
  """
  hasContactNotificationSet: Boolean!
  """
  The status of the notification for this presentation flow.
  """
  notificationStatus: PresentationFlowNotificationStatus
  """
  The communications that have been sent for this presentation flow.
  """
  communications(
    where: CommunicationWhere
    offset: NonNegativeInt
    limit: PositiveInt
    orderBy: CommunicationOrderBy
    orderDirection: OrderDirection
  ): [Communication!]!
}

input SubmitActionsInput {
  dataResults: JSONObject
  actionKey: String
}

"""
Input for creating presentation flow presentation requests.
"""
input CreatePresentationRequestForPresentationFlowInput {
  includeQRCode: Boolean
}

input PresentationFlowsWhere {
  createdById: ID
  identityId: ID
  status: PresentationFlowStatus
  incomplete: Boolean
  createdFrom: DateTime
  createdTo: DateTime
}

input IdentityPresentationFlowsWhere {
  status: PresentationFlowStatus
  incomplete: Boolean
  createdFrom: DateTime
  createdTo: DateTime
}

enum PresentationFlowsOrderBy {
  createdAt
}

"""
The details of the person who submitted the presentation flow
"""
type ActionedBy {
  """
  The id of this identity
  """
  id: ID!
  """
  The name of the identity
  """
  name: String!
}

type ActionedPresentationFlowData {
  presentationFlowId: ID!
  correlationId: ID
  requestData: JSONObject
  state: String
  status: PresentationFlowStatus!
  presentationId: ID
  dataResults: JSONObject
  actionKey: String
  submittedAt: DateTime
  submittedBy: ActionedBy
  callbackSecret: String!
}

extend type Mutation {
  createPresentationFlow(request: PresentationFlowInput!): PresentationFlowResponse!
  createPresentationRequestForPresentationFlow(
    presentationFlowId: ID!
    input: CreatePresentationRequestForPresentationFlowInput
  ): PresentationRequestResponse!
  submitPresentationFlowActions(id: ID!, input: SubmitActionsInput!): PresentationFlow!
  cancelPresentationFlow(id: ID!): Void
  createPresentationFlowTemplate(input: PresentationFlowTemplateInput!): PresentationFlowTemplate!
  updatePresentationFlowTemplate(id: ID!, input: PresentationFlowTemplateInput!): PresentationFlowTemplate!
  deletePresentationFlowTemplate(id: ID!): Void
  """
  Resend the presentation flow notification for the specified presentation flow ID.

  Items of note:
  - Synchronous operation that returns the updated presentation flow.
  - Only works for presentation flows that are in a pending state.
  """
  resendPresentationFlowNotification(presentationFlowId: UUID!): PresentationFlow
  """
  Update the presentation flow contact information.

  Items of note:

  - Contact information can only be updated when the presentation flow is in a pending state.
  """
  updatePresentationFlowContact(presentationFlowId: UUID!, contact: PresentationFlowContactInput): PresentationFlow
}

extend type Query {
  presentationFlow(id: ID!): PresentationFlow!
  findPresentationFlows(
    where: PresentationFlowsWhere
    offset: NonNegativeInt
    limit: PositiveInt = 100
    orderBy: PresentationFlowsOrderBy
    orderDirection: OrderDirection
  ): [PresentationFlow!]!
  actionedPresentationFlowData(id: ID!): ActionedPresentationFlowData
  presentationFlowTemplate(id: ID!): PresentationFlowTemplate!
  findPresentationFlowTemplates: [PresentationFlowTemplate!]!
  """
  Returns the presentation flow contact information.

  Items of note:

  - Returns PII information about the recipient. Use with caution. Intended for verification of presentation flows by admins only.
  - If the presentation flow has been submitted or expired, this information is no longer available.
  """
  presentationFlowContact(presentationFlowId: UUID!): PresentationFlowContact
}

extend type Subscription {
  """
  Returns the updated presentation flow when its status changes.
  """
  presentationFlowEvent(id: ID!): PresentationFlow!
}

"""
Controls notification behaviour when creating a presentation flow from a template.
"""
type PresentationFlowTemplateNotification {
  """
  Whether notifications are enabled by default for flows created from this template.
  """
  enabled: Boolean!
  """
  Whether the runner can change the send-notification toggle. When false the runner sees no notification section.
  """
  enabledVisible: Boolean!
  """
  The notification method locked by the template. Null means the runner may choose freely (when methodVisible is true).
  """
  method: ContactMethod
  """
  Whether the runner can change the notification method. When false the method is fixed to the value above.
  """
  methodVisible: Boolean!
}

input PresentationFlowTemplateNotificationInput {
  enabled: Boolean!
  enabledVisible: Boolean!
  method: ContactMethod
  methodVisible: Boolean!
}

"""
Controls which fields are visible when creating a presentation flow from a template.
"""
type PresentationFlowTemplateFieldVisibility {
  title: Boolean
  prePresentationText: Boolean
  postPresentationText: Boolean
  credentialTypes: Boolean
  allowRevoked: Boolean
  faceCheck: Boolean
  expiresAt: Boolean
  dataSchema: Boolean
  actions: Boolean
  autoSubmit: Boolean
  constraints: Boolean
  clientName: Boolean
}

input PresentationFlowTemplateFieldVisibilityInput {
  title: Boolean
  prePresentationText: Boolean
  postPresentationText: Boolean
  credentialTypes: Boolean
  allowRevoked: Boolean
  faceCheck: Boolean
  expiresAt: Boolean
  dataSchema: Boolean
  actions: Boolean
  autoSubmit: Boolean
  constraints: Boolean
  clientName: Boolean
}

"""
A template for creating presentation flows.
"""
type PresentationFlowTemplate {
  id: ID!
  name: String!
  title: String
  prePresentationText: Markdown
  postPresentationText: Markdown
  presentationRequest: JSONObject!
  dataSchema: [DataDefinition!]
  actions: [Action!]
  autoSubmit: Boolean
  expiresAfterDays: Int
  fieldVisibility: PresentationFlowTemplateFieldVisibility!
  notification: PresentationFlowTemplateNotification!
  createdBy: User!
  createdAt: DateTime!
  updatedBy: User
  updatedAt: DateTime
  isDeleted: Boolean!
}

input PresentationFlowTemplateInput {
  name: String!
  title: String
  prePresentationText: Markdown
  postPresentationText: Markdown
  presentationRequest: PresentationRequestInput!
  dataSchema: [DataDefinitionInput!]
  actions: [ActionInput!]
  autoSubmit: Boolean
  expiresAfterDays: Int
  fieldVisibility: PresentationFlowTemplateFieldVisibilityInput!
  notification: PresentationFlowTemplateNotificationInput
}

extend type Identity {
  presentationFlows(where: IdentityPresentationFlowsWhere, offset: NonNegativeInt, limit: PositiveInt = 100): [PresentationFlow!]!
}
