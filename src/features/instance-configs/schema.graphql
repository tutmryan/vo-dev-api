# eslint-disable @graphql-eslint/strict-id-in-types
# eslint-disable @graphql-eslint/naming-convention
"""
A human-friendly label for a specific application (by identifier)
"""
type ApplicationLabelConfig {
  """
  The local ID of the label config
  """
  id: ID!

  """
  A unique identifier for the application (typically an object ID)
  """
  identifier: String!

  """
  A human-friendly label for this application
  """
  name: String!
}

"""
A config for allowed CORS origin
"""
type CorsOriginConfig {
  """
  The local ID of the CORS origin config
  """
  id: ID!

  """
  The origin value or regex pattern (e.g. https://example.com or ^https://.*\\.foo\\.com$)
  """
  origin: String!
}

"""
Input payload for a application label config
"""
input ApplicationLabelConfigInput {
  """
  A unique identifier for the application (typically an object ID)
  """
  identifier: String!

  """
  A human-friendly label for the application
  """
  name: String!
}

"""
Input payload for a CORS origin config
"""
input CorsOriginConfigInput {
  """
  The origin value or regex pattern (e.g. https://example.com or ^https://.*\\.foo\\.com$)
  """
  origin: String!
}

"""
A config for email sender (override)
"""
type EmailSenderConfig {
  """
  The sender name to use for emails
  """
  senderName: String!

  """
  The sender email address to use for emails
  """
  senderEmail: String!
}

"""
Input payload for an Email Sender config
"""
input EmailSenderConfigInput {
  """
  The sender name to use for emails
  """
  senderName: String

  """
  The sender email address to use for emails
  """
  senderEmail: String
}

"""
Available instance setting keys
"""
enum InstanceSettingKey {
  """
  Email sender configuration (senderName, senderEmail)
  """
  emailSender

  """
  Whether to use modern OIDC UI (true = modern, false = legacy EJS)
  """
  useModernOidcUi
}

"""
Instance setting result - value is JSON encoded based on the key type
"""
type InstanceSetting {
  """
  The setting key
  """
  key: InstanceSettingKey!

  """
  The setting value as JSON string. Parse based on key:
  - emailSender: { senderName?: string, senderEmail?: string }
  - useModernOidcUi: boolean
  """
  value: JSON!
}

"""
Input for setting an instance setting. Value must be valid JSON matching the key's expected type.
"""
input SetInstanceSettingInput {
  """
  The setting key
  """
  key: InstanceSettingKey!

  """
  The setting value as JSON string. Must match the key's expected type:
  - emailSender: { senderName?: string, senderEmail?: string }
  - useModernOidcUi: boolean
  """
  value: JSON!
}

extend type Query {
  """
  List all application label configs for a given identity store
  """
  applicationLabelConfigs(identityStoreId: ID!): [ApplicationLabelConfig!]!

  """
  List all CORS origin configs
  """
  corsOriginConfigs: [CorsOriginConfig!]!

  """
  Get the current email sender configuration.
  Returns null if no override is set.
  """
  emailSenderConfig: EmailSenderConfig!

  """
  Get an instance setting by key. Returns null if not set.
  """
  instanceSetting(key: InstanceSettingKey!): InstanceSetting
}

extend type Mutation {
  """
  Replace all user configurable application label configurations for a given identity stores
  """
  setApplicationLabelConfigs(identityStoreId: ID!, input: [ApplicationLabelConfigInput!]!): [ApplicationLabelConfig!]!

  """
  Replace user configurable CORS origin configurations for the VO API instance
  """
  setCorsOriginConfigs(input: [CorsOriginConfigInput!]!): [CorsOriginConfig!]!

  """
  Set or update the email sender configuration.
  Passing null or omitting fields will unset the override and revert to defaults.
  """
  setEmailSenderConfig(input: EmailSenderConfigInput!): EmailSenderConfig!

  """
  Set an instance setting. Value must be valid JSON matching the key's expected type.
  """
  setInstanceSetting(input: SetInstanceSettingInput!): InstanceSetting!
}
