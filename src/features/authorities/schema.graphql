# eslint-disable @graphql-eslint/strict-id-in-types
# eslint-disable @graphql-eslint/naming-convention

"""
A configured authority or verifiable credential service instance
"""
type Authority {
  """
  An autogenerated unique ID, which can be used to retrieve or update the specific instance of the verifiable credential service
  """
  id: ID!
  """
  The friendly name of this instance of the verifiable credential service
  """
  name: String!
  didModel: DidModel!
  keyVaultMetadata: KeyVaultMetadata!
  """
  Indicates whether the linked domains have been verified
  """
  linkedDomainsVerified: Boolean!
}

"""
Information about the DID and keys
"""
interface DidModel {
  """
  The DID for this verifiable credential service instance
  """
  did: ID!
  """
  URL to the signing key
  """
  signingKeys: [String!]!
  """
  Domains linked to this DID
  """
  linkedDomainUrls: [URL!]!
  didDocumentStatus: DidDocumentStatus!
}

"""
DID information for the ION model
"""
type IonDidModel implements DidModel {
  did: ID!
  signingKeys: [String!]!
  """
  URL to the recovery  key
  """
  recoveryKeys: [String!]!
  """
  URL to the encryption  key
  """
  updateKeys: [String!]!
  encryptionKeys: [String!]!
  linkedDomainUrls: [URL!]!
  didDocumentStatus: DidDocumentStatus!
}

"""
DID information for the Web model
"""
type WebDidModel implements DidModel {
  did: ID!
  signingKeys: [String!]!
  linkedDomainUrls: [URL!]!
  didDocumentStatus: DidDocumentStatus!
}

"""
status of the DID, published when it's written to ION otherwise it will be submitted
"""
enum DidDocumentStatus {
  submitted
  published
}

"""
Information about the used Key Vault
"""
type KeyVaultMetadata {
  """
  The Azure subscription this Key Vault resides in
  """
  subscriptionId: ID!
  """
  Name of this Key Vault's resource group
  """
  resourceGroup: String!
  """
  Key Vault name
  """
  resourceName: String!
  """
  URL to this Key Vault
  """
  resourceUrl: URL!
}

# eslint-disable-next-line @graphql-eslint/require-description
type Query {
  """
  Returns an authority by ID
  """
  authority(id: ID!): Authority
  """
  Lists all the configured authorities
  """
  authorities: [Authority!]!
}
