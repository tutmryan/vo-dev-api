  Returns the weekly average of credential presentations for this contract.
  """
  presentationWeeklyAverage(where: ContractPresentationWeeklyAverageWhere!): Float!
}

extend type Identity {
  """
  Returns the successful credential presentations for this identity.
  """
  presentations(where: IdentityPresentationWhere, offset: PositiveInt, limit: PositiveInt = 100): [Presentation!]!
}

extend type User {
  """
  Returns the successful credential presentations this user has requested (presentation.requestedBy => user).
  """
  presentations(where: UserPresentationWhere, offset: PositiveInt, limit: PositiveInt = 100): [Presentation!]!
}

extend type Issuance {
  """
  Returns the successful credential presentations for this issuance.
  """
  presentations(where: IssuancePresentationWhere, offset: PositiveInt, limit: PositiveInt = 100): [Presentation!]!
}

extend type Partner {
  """
  Returns the successful credential presentations of credentials issued by this partner.
  """
  presentations(where: PartnerPresentationWhere, offset: PositiveInt, limit: PositiveInt = 100): [Presentation!]!
}

extend type OidcClient {
  """
  Returns the successful credential presentations that were requested for authorization .
  """
  presentations(where: OidcClientPresentationWhere, offset: PositiveInt, limit: PositiveInt = 100): [Presentation!]!
}

extend type Wallet {
