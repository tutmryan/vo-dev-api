"""
Defines the branding configuration for VO applications.
"""
type Branding {
  """
  The ID of the branding configuration.
  """
  id: ID!
  """
  The name of the platform this branding is for
  """
  name: String!
  """
  The branding configuration data.
  """
  data: JSONObject
  """
  The user who created the branding
  """
  createdBy: User!
  """
  When the branding was created.
  """
  createdAt: DateTime!
  """
  The user who last updated the branding.
  """
  updatedBy: User
  """
  When the branding was last updated.
  """
  updatedAt: DateTime
}

"""
Defines the input to create or update a concierge branding configuration.
"""
input ConciergeBrandingInput {
  """
  The Concierge branding configuration data.
  """
  data: JSONObject!
}

"""
Defines the input to create or update a composer branding configuration.
"""
input ComposerBrandingInput {
  """
  The Composer branding configuration data.
  """
  data: JSONObject!
}

extend type Query {
  """
  Returns the Concierge branding config or null if no branding has been saved yet.
  """
  conciergeBranding: Branding
  """
  Returns the Composer branding config or null if no branding has been saved yet.
  """
  composerBranding: Branding
}

extend type Mutation {
  """
  Create or update a Concierge branding config.
  """
  saveConciergeBranding(input: ConciergeBrandingInput!): Branding!
  """
  Deletes an existing Concierge branding.
  """
  deleteConciergeBranding: Void
  """
  Create or update Composer branding config.
  """
  saveComposerBranding(input: ComposerBrandingInput!): Branding!
  """
  Deletes existing Composer branding.
  """
  deleteComposerBranding: Void
}
