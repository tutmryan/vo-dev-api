  """
  Updates for the concierge OIDC client.
  """
  updateConciergeClient(input: ConciergeClientInput!): OidcClient!

  """
  Updates the vc_* authorisation parameter policy for an OIDC client.
  """
  updateOidcClientVcPolicy(clientId: ID!, input: OidcClientVcPolicyInput!): OidcClient!
}

extend type Query {
  """
  Returns a single OIDC client by ID
  """
  oidcClient(id: ID!): OidcClient!
  """
  Returns OIDC clients, optionally matching the specified criteria
  """
  findOidcClients(
    where: OidcClientWhere
    offset: NonNegativeInt
    limit: PositiveInt = 100
    orderBy: OidcClientOrderBy
    orderDirection: OrderDirection
  ): [OidcClient!]!

  """
  Returns a single OIDC resource by ID
  """
  oidcResource(id: ID!): OidcResource!
  """
  Returns OIDC resources, optionally matching the specified criteria
  """
  findOidcResources(
    where: OidcResourceWhere
    offset: NonNegativeInt
    limit: PositiveInt = 100
    orderBy: OidcResourceOrderBy
    orderDirection: OrderDirection
  ): [OidcResource!]!

  """
  Returns a single OIDC claim mapping by ID
  """
  oidcClaimMapping(id: ID!): OidcClaimMapping!
  """
  Returns OIDC claim mappings, optionally matching the specified criteria.
  """
  findOidcClaimMappings(
    where: OidcClaimMappingWhere
    offset: NonNegativeInt
    limit: PositiveInt = 100
    orderBy: OidcClaimMappingOrderBy
    orderDirection: OrderDirection
  ): [OidcClaimMapping!]!

  """
  Returns a single OIDC identity resolver by ID
  """
  oidcIdentityResolver(id: ID!): OidcIdentityResolver!
  """
  Returns OIDC identity resolvers, optionally matching the specified criteria.
  """
  findOidcIdentityResolvers(
    where: OidcIdentityResolverWhere
    offset: PositiveInt
    limit: PositiveInt = 100
    orderBy: OidcIdentityResolverOrderBy
    orderDirection: OrderDirection
  ): [OidcIdentityResolver!]!
}

"""
The type of OIDC application.

Refer to `application_type` in https://openid.net/specs/openid-connect-registration-1_0.html#ClientMetadata
"""
enum OidcApplicationType {
  """
  Web clients must register redirect_uris using the https scheme, unless the VO instance has dev tools enabled, where http:localhost may be used.
  """
  web
  """
  Native Clients MUST only register redirect_uris using custom URI schemes or loopback URLs using the http scheme; loopback URLs use localhost or the IP loopback literals 127.0.0.1 or [::1] as the hostname.

  [reference](https://openid.net/specs/openid-connect-registration-1_0.html#ClientMetadata)
  """
  native
}

"""
The type of OIDC client.

Refer to https://www.rfc-editor.org/rfc/rfc6749#section-2.1
"""
enum OidcClientType {
  """
  A client used where secrets cannot be securely stored, e.g. browser-based or mobile authentication.
  """
  public
  """
  A client used where secrets can be securely stored, e.g. server-side authentication.
  """
  confidential
}

"""
The token endpoint authentication method for a confidential OIDC client.

Refer to https://openid.net/specs/openid-connect-core-1_0.html#ClientAuthentication
"""
enum OidcTokenEndpointAuthMethod {
  """
  No client authentication (public clients).
  """
  none
  """
  Client authenticates by including the client secret in the token request body.
  """
  client_secret_post
  """
  Client authenticates by sending a signed JWT assertion using a registered public key.
  """
  private_key_jwt
}

"""
The OAuth response types supported by an OIDC client.
"""
enum OidcResponseType {
  """
  Authorisation code response type, returns an authorisation code.
  """
  CODE
  """
  ID token response type, can be used alone or with CODE for hybrid flow (code id_token).
  """
  ID_TOKEN
}

