  """
  Updates an existing OIDC resource.

  Note:
  - If scopes are removed from the resource, those scopes will be removed from all clients that have the resource. If no scopes remain on the client resource, the client resource will be deleted.
  """
  updateOidcResource(id: ID!, input: OidcResourceInput!): OidcResource!
  """
  Deletes an OIDC resource
  """
  deleteOidcResource(id: ID!): OidcResource!

  """
  Creates a new OIDC client resource
  """
  createOidcClientResource(clientId: ID!, input: OidcClientResourceInput!): OidcClient!
  """
  Updates an existing OIDC client resource
  """
  updateOidcClientResource(clientId: ID!, input: OidcClientResourceInput!): OidcClient!
  """
  Deletes an OIDC client resource
  """
  deleteOidcClientResource(clientId: ID!, resourceId: ID!): OidcClient!

  """
  Creates a new OIDC claim mapping
  """
  createOidcClaimMapping(input: OidcClaimMappingInput!): OidcClaimMapping!
  """
  Updates an existing OIDC claim mapping
  """
  updateOidcClaimMapping(id: ID!, input: OidcClaimMappingInput!): OidcClaimMapping!
  """
  Deletes an OIDC claim mapping
  """
  deleteOidcClaimMapping(id: ID!): OidcClaimMapping!

  """
  Updates the claim mappings for an OIDC client.
  """
  updateOidcClientClaimMappings(clientId: ID!, claimMappingIds: [ID!]!): OidcClient!

  """
  Creates a new OIDC identity resolver.
  """
  createOidcIdentityResolver(input: OidcIdentityResolverInput!): OidcIdentityResolver!
  """
  Updates an existing OIDC identity resolver.
  """
  updateOidcIdentityResolver(id: ID!, input: OidcIdentityResolverInput!): OidcIdentityResolver!
  """
  Deletes an OIDC identity resolver.
  """
  deleteOidcIdentityResolver(id: ID!): OidcIdentityResolver!

