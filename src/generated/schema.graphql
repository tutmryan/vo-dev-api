"""An instance of a successful credential presentation."""
type Presentation {
  id: ID!

  """The identity of the person who presented the credential (if known)."""
  identity: Identity

  """
  The issuances that were presented (which may be none, if the presented credentials were from an external issuer)
  """
  issuances: [Issuance!]!

  """
  The requesting OIDC client, if this presentation was made for OIDC authentication.
  """
  oidcClient: OidcClient

  """
  The partners who issued the credentials that were presented (which may be none, if the presented credentials were internal)
  """
  partners: [Partner!]!
  presentedAt: DateTime!

  """The credentials that were presented (excluding claims data)"""
  presentedCredentials: [PresentedCredential!]!

  """
  The receipt for with this presentation with `vp_token` redacted (to avoid retaining PII info).
  """
  receipt: JSONObject

  """
  The platform user (application or person) that requested the credential presentation.
  """
  requestedBy: User!

  """The credentials that were requested"""
  requestedCredentials: [RequestedCredential!]!

  """The wallet associated with this presentation."""
  wallet: Wallet
}

"""
The callback endpoint is called when a user scans the QR code, uses the deep link the authenticator app, or finishes the presentation process.
"""
type PresentationCallbackEvent {
  """
  When the requestStatus property value is presentation_error, this property contains information about the error.
  """
  error: RequestError

  """
  The receipt contains the original payload sent from the wallet to the Verifiable Credentials service.
  The receipt should be used for troubleshooting/debugging only.
  The format in the receipt isn't fix and can change based on the wallet and version used.
  """
  receipt: JSONObject

  """
  Mapped to the original request when the payload was posted to the Verifiable Credentials service.
  """
  requestId: ID!
  requestStatus: PresentationRequestStatus!

  """
  The optional state value that you passed in the original request payload.
  """
  state: String

  """The verifiable credential user DID."""
  subject: String
  verifiedCredentialsData: [PresentedCredential!]
}

"""
Represents a credential presentation between a client application and a user (presenter of the credential and associated claims)
"""
type PresentationEvent {
  """The claims presented"""
  claims: JSONObject!

  """The client application that requested the presentation"""
  clientName: String!

  """The credential types that were specified as accepted for presentation"""
  credentialTypes: String!

  """The list of issuers that were specified as accepted for presentation"""
  issuers: String!

  """When the presentation was made"""
  time: DateTime!
}

"""Data representing an presentation event."""
type PresentationEventData {
  """The callback event data"""
  event: PresentationCallbackEvent!

  """The presentation data, if the presentation was successful"""
  presentation: Presentation
}

"""Criteria for filtering presentation events."""
input PresentationEventWhere {
  """The ID of the identity that the presentation is for."""
  identityId: ID

  """
  The requestId of the presentation request, returned from the createPresentationRequest mutation.
  """
  requestId: ID

  """
  The ID of the user (Person or Application) that requested presentation.
  """
  requestedById: ID

  """Only return events with the specified status."""
  status: PresentationRequestStatus

  """
  The type of credential presented.
  Note: type data is only available on complete presentation events; if specified, only complete presentations containing this type will be returned.
  """
  type: String
}

"""A presentation flow."""
type PresentationFlow {
  action: Action
  actions: [Action!]
  autoSubmit: Boolean

  """The communications that have been sent for this presentation flow."""
  communications(limit: PositiveInt, offset: NonNegativeInt, orderBy: CommunicationOrderBy, orderDirection: OrderDirection, where: CommunicationWhere): [Communication!]!
  createdAt: DateTime!
  createdBy: User!
  dataResults: JSONObject
  dataSchema: [DataDefinition!]
  expiresAt: DateTime!

  """
  Indicates whether this presentation flow has contact notification details set.
  """
  hasContactNotificationSet: Boolean!
  id: ID!
  identity: Identity
  isCancelled: Boolean
  isSubmitted: Boolean

  """The status of the notification for this presentation flow."""
  notificationStatus: PresentationFlowNotificationStatus
  portalUrl: String!
  postPresentationText: Markdown
  prePresentationText: Markdown
  presentation: Presentation
  presentationRequest: JSONObject
  requestData: JSONObject
  status: PresentationFlowStatus!
  template: PresentationFlowTemplate
  title: String

  """
  The type of this presentation flow — vc for a standard Verifiable Credential flow, mdoc for an ISO 18013-5 mDoc/Google Wallet ID flow.
  """
  type: String!
  updatedAt: DateTime
  updatedBy: User
}

"""Represents the presentation flow contact information."""
type PresentationFlowContact {
  """The notification contact information."""
  notification: Contact
}

"""
Input defining the presentation flow contact information for notifications.
"""
input PresentationFlowContactInput {
  """
  How the presentation flow notification should be sent.
  Set to null to remove the notification.
  """
  notification: ContactInput
}

input PresentationFlowInput {
  actions: [ActionInput!]
  autoSubmit: Boolean
  callback: Callback

  """
  The contact information for sending notifications about this presentation flow.
  When provided, a notification will be sent to the recipient.
  """
  contact: PresentationFlowContactInput
  correlationId: ID
  dataSchema: [DataDefinitionInput!]
  expiresAt: DateTime
  identityId: ID
  postPresentationText: Markdown
  prePresentationText: Markdown
  presentationRequest: PresentationRequestInput!
  requestData: JSONObject
  templateId: ID
  title: String
}

"""The notification status of the presentation flow."""
enum PresentationFlowNotificationStatus {
  """Notification failed to send."""
  FAILED

  """No notification configured for this presentation flow."""
  NONE

  """Notification job is queued but not yet sent."""
  PENDING

  """Notification was successfully sent."""
  SENT
}

union PresentationFlowRequestResponse = MDocPresentationResponse | PresentationResponse | RequestErrorResponse

type PresentationFlowResponse {
  callbackSecret: String!
  request: PresentationFlow!
}

"""The status of the presentation flow."""
enum PresentationFlowStatus {
  CANCELLED
  EXPIRED
  PENDING
  PRESENTATION_VERIFIED
  REQUEST_CREATED
  REQUEST_RETRIEVED
  SUBMITTED
}

"""A template for creating presentation flows."""
type PresentationFlowTemplate {
  actions: [Action!]
  autoSubmit: Boolean
  createdAt: DateTime!
  createdBy: User!
  dataSchema: [DataDefinition!]
  expiresAfterDays: Int
  fieldVisibility: PresentationFlowTemplateFieldVisibility!
  id: ID!
  isDeleted: Boolean!
  name: String!
  notification: PresentationFlowTemplateNotification!
  postPresentationText: Markdown
  prePresentationText: Markdown
  presentationRequest: JSONObject!
  title: String
  updatedAt: DateTime
  updatedBy: User
}

"""
Controls which fields are visible when creating a presentation flow from a template.
"""
type PresentationFlowTemplateFieldVisibility {
  actions: Boolean
  allowRevoked: Boolean
  autoSubmit: Boolean
  clientName: Boolean
  constraints: Boolean
  credentialTypes: Boolean
  dataSchema: Boolean
  expiresAt: Boolean
  faceCheck: Boolean
  postPresentationText: Boolean
  prePresentationText: Boolean
  title: Boolean
}

input PresentationFlowTemplateFieldVisibilityInput {
  actions: Boolean
  allowRevoked: Boolean
  autoSubmit: Boolean
  clientName: Boolean
  constraints: Boolean
  credentialTypes: Boolean
  dataSchema: Boolean
  expiresAt: Boolean
  faceCheck: Boolean
  postPresentationText: Boolean
  prePresentationText: Boolean
  title: Boolean
}

input PresentationFlowTemplateInput {
  actions: [ActionInput!]
  autoSubmit: Boolean
  dataSchema: [DataDefinitionInput!]
  expiresAfterDays: Int
  fieldVisibility: PresentationFlowTemplateFieldVisibilityInput!
  name: String!
  notification: PresentationFlowTemplateNotificationInput
  postPresentationText: Markdown
  prePresentationText: Markdown
  presentationRequest: PresentationRequestInput!
  title: String
}

"""
Controls notification behaviour when creating a presentation flow from a template.
"""
type PresentationFlowTemplateNotification {
  """
  Whether notifications are enabled by default for flows created from this template.
  """
  enabled: Boolean!

  """
  Whether the runner can change the send-notification toggle. When false the runner sees no notification section.
  """
  enabledVisible: Boolean!

  """
  The notification method locked by the template. Null means the runner may choose freely (when methodVisible is true).
  """
  method: ContactMethod

  """
  Whether the runner can change the notification method. When false the method is fixed to the value above.
  """
  methodVisible: Boolean!
}

input PresentationFlowTemplateNotificationInput {
  enabled: Boolean!
  enabledVisible: Boolean!
  method: ContactMethod
  methodVisible: Boolean!
}

"""A limited presentation flow token response."""
type PresentationFlowTokenResponse {
  expires: DateTime!
  token: String!
}

enum PresentationFlowsOrderBy {
  createdAt
}

input PresentationFlowsWhere {
  createdById: ID
  createdFrom: DateTime
  createdTo: DateTime
  identityId: ID
  incomplete: Boolean
  status: PresentationFlowStatus
}

"""Fields that can be used for sorting presentations."""
enum PresentationOrderBy {
  """The name of the identity who presented the credential."""
  identityName

  """The timestamp when the credential was presented"""
  presentedAt

  """
  The name of the user (Person or Application) that requested & received the presentation data.
  """
  requestedByName
}

"""
Input type for verifying a presentation receipt.
This input contains the raw JWTs (JSON Web Tokens) that serve as cryptographic receipts
attesting to the authenticity and integrity of a presentation.

Typically, these tokens are generated and returned as part of a credential presentation process.
"""
input PresentationReceiptInput {
  """
  An optional JWT receipt used for biometric verification (face check) if such a check
  was performed as part of the presentation.
  """
  faceCheck: String

  """
  The primary JWT receipt for the presentation, known as the id_token.
  This token contains verifiable claims and must be provided for verification.
  """
  id_token: String!
}

"""
The presentation request payload contains information about your verifiable credentials presentation request.
"""
input PresentationRequestInput {
  callback: Callback

  """
  The identity who will present (alternatively use the identityId property, if known).
  Presentation identity information is only required for presentations where all requested credentials are issued by external partners.
  """
  identity: IdentityInput

  """
  The ID of the identity who will present (alternatively use the identity property).
  Presentation identity information is only required for presentations where all requested credentials are issued by external partners.
  When provided, a `identityId` constraint will be added to every requested credential.
  """
  identityId: ID

  """
  Determines whether a QR code is included in the response of this request.
  Present the QR code and ask the user to scan it.
  Scanning the QR code launches the authenticator app with this presentation request.
  Possible values are true (default) or false.
  When you set the value to false, use the return url property to render a deep link.
  """
  includeQRCode: Boolean

  """
  Determines whether a receipt should be included in the response of this request.
  Possible values are true or false (default).
  The receipt contains the original payload sent from the authenticator to the Verifiable Credentials service.
  The receipt is useful for troubleshooting or if you have the need to get the full details of the payload.
  There's otherwise no need to set this value to true by default.
  In the OpenId Connect SIOP request, the receipt contains the ID token from the original request.
  
  The receipt is internally redacted before being stored or logged to ensure
  sensitive values like `vp_token` and credential subjects are not persisted. Only selected fields such as `id_token`
  and `faceCheck` (if present) are retained.
  """
  includeReceipt: Boolean
  registration: PresentationRequestRegistration!

  """
  A collection of RequestCredential objects representing the credentials the user needs to provide.
  """
  requestedCredentials: [RequestCredential!]!
}

"""Provides information about the verifier."""
input PresentationRequestRegistration {
  """
  A display name of the verifier of the verifiable credential. This name will be presented to the user in the authenticator app.
  """
  clientName: String!

  """
  A string that is displayed to inform the user why the verifiable credentials are being requested.
  """
  purpose: String
}

union PresentationRequestResponse = PresentationResponse | RequestErrorResponse

"""The status returned for the request."""
enum PresentationRequestStatus {
  """
  The verifiable credential presentation failed, refer to the error property for details.
  """
  presentation_error

  """The verifiable credential validation completed successfully."""
  presentation_verified

  """
  The user scanned the QR code or selected the link that starts the presentation flow.
  """
  request_retrieved
}

"""Represents a successful presentation request response"""
type PresentationResponse {
  """Indicates when the response will expire."""
  expiry: PositiveInt!

  """A QR code that the user can scan to start the presentation flow."""
  qrCode: String

  """
  An autogenerated request ID. The callback uses the same request, allowing you to keep track of the presentation request and its callbacks.
  """
  requestId: ID!

  """
  A URL that launches the authenticator app and starts the presentation process. You can present this URL to the user if they can't scan the QR code.
  """
  url: URL!
}

"""Criteria for filtering presentations."""
input PresentationWhere {
  """The ID of a contract that was presented."""
  contractId: ID

  """The start of the presentedAt period to include."""
  from: DateTime

  """List presentations by identity."""
  identityId: ID

  """List presentations by identity store."""
  identityStoreId: ID

  """Whether face check validation was requested."""
  isFaceCheckRequested: Boolean

  """The issuance that was presented"""
  issuanceId: ID

  """
  The ID of the OIDC client that requested authentication resulting in the presentation.
  """
  oidcClientId: ID

  """The partner who issued the credential that was presented"""
  partnerId: ID

  """The type of credential presented."""
  presentedType: String

  """The requestId of the presentation request."""
  requestId: ID

  """
  The ID of the user (Person or Application) that requested & received the presentation data.
  """
  requestedById: ID

  """The type of credential requested."""
  requestedType: String

  """The end of the presentedAt period to include."""
  to: DateTime

  """The ID of the wallet who presented the credential"""
  walletId: ID
}

"""
Loosely typed representation based on documentation / example event here: https://docs.microsoft.com/en-us/azure/active-directory/verifiable-credentials/presentation-request-api#callback-events
"""
type PresentedCredential {
  claims: JSONObject!
  credentialState: JSONObject!
  domainValidation: JSONObject
  faceCheck: FaceCheckResult
  issuer: String!
  type: [String!]!
}

type Query {
  """
  Returns access packages that can be assigned upon presentation of a credential with the specified contract's credential types.
  Queries all configured Entra identity stores for access package assignment policies with matching verifiable credential settings.
  Returns an empty array if no matching packages are found or if the required permissions are not granted.
  """
  accessPackages(contractId: ID!): [AccessPackage!]!
  actionedPresentationFlowData(id: ID!): ActionedPresentationFlowData

  """List all application label configs for a given identity store"""
  applicationLabelConfigs(identityStoreId: ID!): [ApplicationLabelConfig!]!

  """
  Returns the async issuance issuee contact information.
  
  Items of note:
  
  - Returns PII information about the issuee. Use with caution. Intended for verification of async issuance requests by admins only.
  - If the async issuance has been issued, or has expired, this information is no longer available.
  """
  asyncIssuanceContact(asyncIssuanceRequestId: UUID!): AsyncIssuanceContact

  """Returns an async issuance request by ID."""
  asyncIssuanceRequest(id: UUID!): AsyncIssuanceRequest!

  """Returns the details of the configured instance authority"""
  authority: Authority!

  """
  Check if the current authenticated identity is eligible for self-service Temporary Access Pass.
  """
  checkMyTapEligibility: [SelfServiceAction!]!

  """
  Returns the Composer branding config or null if no branding has been saved yet.
  """
  composerBranding: Branding

  """
  Returns the Concierge branding config or null if no branding has been saved yet.
  """
  conciergeBranding: Branding

  """Returns a contract by ID"""
  contract(id: ID!): Contract!

  """List all CORS origin configs"""
  corsOriginConfigs: [CorsOriginConfig!]!

  """
  Returns the total count of credential records matching the specified criteria.
  """
  credentialRecordCount(where: CredentialRecordWhere): NonNegativeInt!

  """
  Returns a list of credential types, optionally filtered by the given criteria.
  By default, all credential types are returned.
  """
  credentialTypes(where: CredentialTypesWhere): [String!]!
  discovery: Discovery!

  """
  Get the current email sender configuration.
  Returns null if no override is set.
  """
  emailSenderConfig: EmailSenderConfig!

  """
  Returns async issuance requests, optionally matching the specified criteria.
  """
  findAsyncIssuanceRequests(limit: PositiveInt = 100, offset: NonNegativeInt, orderBy: AsyncIssuanceRequestsOrderBy, orderDirection: OrderDirection, where: AsyncIssuanceRequestsWhere): [AsyncIssuanceRequest!]!

  """Returns communications, optionally matching the specified criteria"""
  findCommunications(limit: PositiveInt, offset: NonNegativeInt, orderBy: CommunicationOrderBy, orderDirection: OrderDirection, where: CommunicationWhere): [Communication!]!

  """Returns contracts, optionally matching the specified criteria"""
  findContracts(limit: PositiveInt, offset: NonNegativeInt, orderBy: ContractOrderBy, orderDirection: OrderDirection, where: ContractWhere): [Contract!]!

  """
  Returns a unified view of credential records, combining issued credentials and pending remote issuance requests.
  """
  findCredentialRecords(limit: PositiveInt = 100, offset: NonNegativeInt, orderBy: CredentialRecordOrderBy, orderDirection: OrderDirection, where: CredentialRecordWhere): [CredentialRecord!]!

  """Returns identities, optionally matching the specified criteria"""
  findIdentities(limit: PositiveInt = 100, offset: NonNegativeInt, orderBy: IdentityOrderBy, orderDirection: OrderDirection, where: IdentityWhere): [Identity!]!

  """Fetch all identity stores"""
  findIdentityStores(limit: PositiveInt, offset: NonNegativeInt, orderBy: IdentityStoreOrderBy, orderDirection: OrderDirection, where: IdentityStoreWhere): [IdentityStore!]!

  """
  Returns successful credential issuances, optionally matching the specified criteria.
  """
  findIssuances(limit: PositiveInt = 100, offset: NonNegativeInt, orderBy: IssuanceOrderBy, orderDirection: OrderDirection, where: IssuanceWhere): [Issuance!]!

  """
  Find Microsoft Entra Temporary Access Pass issuances, optionally filtered by identity store or identity.
  """
  findMicrosoftEntraTemporaryAccessPassIssuances(limit: PositiveInt, offset: NonNegativeInt, orderBy: MicrosoftEntraTemporaryAccessPassIssuanceOrderBy, orderDirection: OrderDirection, where: MicrosoftEntraTemporaryAccessPassIssuanceWhere): [MicrosoftEntraTemporaryAccessPassIssuance!]!

  """
  Finds issuers from the Entra Verified ID network
  See https://learn.microsoft.com/en-us/azure/active-directory/verifiable-credentials/vc-network-api#searching-for-issuers
  """
  findNetworkIssuers(where: NetworkIssuersWhere!): [NetworkIssuer!]!

  """
  Returns OIDC claim mappings, optionally matching the specified criteria.
  """
  findOidcClaimMappings(limit: PositiveInt = 100, offset: NonNegativeInt, orderBy: OidcClaimMappingOrderBy, orderDirection: OrderDirection, where: OidcClaimMappingWhere): [OidcClaimMapping!]!

  """Returns OIDC clients, optionally matching the specified criteria"""
  findOidcClients(limit: PositiveInt = 100, offset: NonNegativeInt, orderBy: OidcClientOrderBy, orderDirection: OrderDirection, where: OidcClientWhere): [OidcClient!]!

  """
  Returns OIDC identity resolvers, optionally matching the specified criteria.
  """
  findOidcIdentityResolvers(limit: PositiveInt = 100, offset: PositiveInt, orderBy: OidcIdentityResolverOrderBy, orderDirection: OrderDirection, where: OidcIdentityResolverWhere): [OidcIdentityResolver!]!

  """Returns OIDC resources, optionally matching the specified criteria"""
  findOidcResources(limit: PositiveInt = 100, offset: NonNegativeInt, orderBy: OidcResourceOrderBy, orderDirection: OrderDirection, where: OidcResourceWhere): [OidcResource!]!

  """Returns partners, optionally matching the specified criteria"""
  findPartners(limit: PositiveInt = 100, offset: NonNegativeInt, orderBy: PartnerOrderBy, orderDirection: OrderDirection, where: PartnerWhere): [Partner!]!
  findPresentationFlowTemplates: [PresentationFlowTemplate!]!
  findPresentationFlows(limit: PositiveInt = 100, offset: NonNegativeInt, orderBy: PresentationFlowsOrderBy, orderDirection: OrderDirection, where: PresentationFlowsWhere): [PresentationFlow!]!

  """
  Returns successful credential presentations, optionally matching the specified criteria.
  """
  findPresentations(limit: PositiveInt = 100, offset: NonNegativeInt, orderBy: PresentationOrderBy, orderDirection: OrderDirection, where: PresentationWhere): [Presentation!]!

  """Returns templates, optionally matching the specified criteria"""
  findTemplates(limit: PositiveInt = 100, offset: NonNegativeInt, where: TemplateWhere): [Template!]!

  """Returns home tenant user identities matching the specified criteria"""
  findTenantIdentities(limit: PositiveInt = 100, where: TenantIdentityWhere!): [TenantIdentity!]!

  """Returns users, optionally matching the specified criteria"""
  findUsers(limit: PositiveInt = 100, offset: NonNegativeInt, orderBy: UserOrderBy, orderDirection: OrderDirection, where: UserWhere): [User!]!

  """Returns wallets, optionally matching the specified criteria"""
  findWallets(limit: PositiveInt = 100, offset: NonNegativeInt, where: WalletWhere): [Wallet!]!

  """No-op query to test if the server is up and running."""
  healthcheck: Void

  """Returns a list of identities for the given IDs"""
  identities(ids: [ID!]): [Identity]!

  """Returns a list of identities for the given issuer identifiers"""
  identitiesByIdentifiers(filters: [IssuerIdentifierInput!]): [Identity]!

  """Returns an identity by ID"""
  identity(id: ID!): Identity!

  """Returns an identity by issuer identifier"""
  identityByIdentifier(issuerId: IssuerIdentifierInput!): Identity!

  """Returns the distinct set of issuers from all identities"""
  identityIssuers: [IdentityIssuer!]!

  """Fetch an identity store by its ID"""
  identityStore(id: ID!): IdentityStore

  """
  Assess the capabilities of the identity store's graph client based on assigned permissions.
  If forceRefresh is true, the cached access package policy list will be invalidated first.
  """
  identityStoreEntraCapabilities(forceRefresh: Boolean, id: ID!): IdentityStoreCapabilities!

  """Returns a single instance by identifier."""
  instanceByIdentifier(identifier: String!): Instance!

  """Get an instance setting by key. Returns null if not set."""
  instanceSetting(key: InstanceSettingKey!): InstanceSetting

  """Returns an issuance by ID"""
  issuance(id: ID!): Issuance!

  """
  Returns the issuance count, optionally matching the specified criteria.
  """
  issuanceCount(where: IssuanceWhere): NonNegativeInt!

  """
  Returns the issuance count, grouped by Contract, optionally matching the specified criteria.
  """
  issuanceCountByContract(limit: PositiveInt, offset: NonNegativeInt, where: IssuanceWhere): [ContractCount!]!

  """
  Returns the issuance count, grouped by Date, optionally matching the specified criteria.
  """
  issuanceCountByDate(where: IssuanceWhere): [DateCount!]!

  """
  Returns the issuance count, grouped by User, optionally matching the specified criteria.
  """
  issuanceCountByUser(limit: PositiveInt, offset: NonNegativeInt, where: IssuanceWhere): [UserCount!]!

  """
  Returns the authenticated caller, either a `User` (app or person) or the `Identity` of a credential issuee.
  """
  me: Me

  """Get a single Microsoft Entra Temporary Access Pass issuance by ID."""
  microsoftEntraTemporaryAccessPassIssuance(id: ID!): MicrosoftEntraTemporaryAccessPassIssuance

  """
  Get a specific Microsoft Entra Temporary Access Pass issuance configuration by ID.
  """
  microsoftEntraTemporaryAccessPassIssuanceConfiguration(id: ID!): MicrosoftEntraTemporaryAccessPassIssuanceConfiguration

  """List Microsoft Entra Temporary Access Pass issuance configurations."""
  microsoftEntraTemporaryAccessPassIssuanceConfigurations: [MicrosoftEntraTemporaryAccessPassIssuanceConfiguration!]!

  """
  Lists the credential contract types for the specified network issuer
  See https://learn.microsoft.com/en-us/azure/active-directory/verifiable-credentials/vc-network-api#searching-for-published-credential-types-by-an-issuer
  """
  networkContracts(issuerId: ID!, tenantId: ID!): [NetworkContract!]!

  """Returns a single OIDC claim mapping by ID"""
  oidcClaimMapping(id: ID!): OidcClaimMapping!

  """Returns a single OIDC client by ID"""
  oidcClient(id: ID!): OidcClient!

  """Returns a single OIDC identity resolver by ID"""
  oidcIdentityResolver(id: ID!): OidcIdentityResolver!

  """Returns a single OIDC resource by ID"""
  oidcResource(id: ID!): OidcResource!

  """Returns a partner by ID"""
  partner(id: ID!): Partner!

  """Returns a partner by DID"""
  partnerByDid(did: String!): Partner

  """
  Returns the current status of the specified photo capture request.
  Note: this query is an alternative to the `photoCaptureEvent` subscription, suitable for polling behaviour.
  """
  photoCaptureStatus(photoCaptureRequestId: UUID!): PhotoCaptureEventData!

  """Returns a presentation by ID"""
  presentation(id: ID!): Presentation!

  """
  Returns the successful presentation count, optionally matching the specified criteria.
  """
  presentationCount(where: PresentationWhere): NonNegativeInt!

  """
  Returns the successful presentation count, grouped by Contract, optionally matching the specified criteria.
  """
  presentationCountByContract(limit: PositiveInt, offset: NonNegativeInt, where: PresentationWhere): [ContractCount!]!

  """
  Returns the successful presentation count, grouped by date, optionally matching the specified criteria.
  """
  presentationCountByDate(where: PresentationWhere): [DateCount!]!

  """
  Returns the successful presentation count, grouped by requesting User, optionally matching the specified criteria.
  """
  presentationCountByUser(limit: PositiveInt, offset: NonNegativeInt, where: PresentationWhere): [UserCount!]!
  presentationFlow(id: ID!): PresentationFlow!

  """
  Returns the presentation flow contact information.
  
  Items of note:
  
  - Returns PII information about the recipient. Use with caution. Intended for verification of presentation flows by admins only.
  - If the presentation flow has been submitted or expired, this information is no longer available.
  """
  presentationFlowContact(presentationFlowId: UUID!): PresentationFlowContact
  presentationFlowTemplate(id: ID!): PresentationFlowTemplate!

  """Returns a template by ID"""
  template(id: ID!): Template!

  """Returns the combined data of a template and its ancestors"""
  templateCombinedData(templateId: ID!): TemplateParentData!

  """
  Tests an authority client by attempting to read the specified authority.
  
  Returns an error if the test fails.
