  """
  Tests an MS Graph client by attempting to run a top(1) User query.
  
  Returns an error if the test fails.
  """
  testMsGraphClient(graphClient: ClientCredentialsInput!, identifier: String!): Void

  """Returns a user by ID"""
  user(id: ID!): User!

  """
  Verifies the tokens in a presentation's receipt and returns the validity of each.
  """
  verifyPresentation(presentedAt: String!, receipt: PresentationReceiptInput!): VerifyPresentationResult!

  """Returns a wallet by ID."""
  wallet(id: ID!): Wallet
}

"""Regular expression claim validation."""
type RegexValidation {
  """The regular expression pattern to validate the claim value."""
  pattern: String!
}

"""Regular expression claim validation."""
input RegexValidationInput {
  """The regular expression pattern to validate the claim value."""
  pattern: String!
