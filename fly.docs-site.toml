app = "docs-site"
primary_region = "syd"

[build]
  dockerfile = "./docs-site/Dockerfile"

[[statics]]
  guest_path = "/app/build"
  url_prefix = "/"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
